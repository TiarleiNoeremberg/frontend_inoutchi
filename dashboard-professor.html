<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a6fc4">
    <title>Inoutchi · Professor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Cloudinary SDK para upload de arquivos -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        /* ================================================
           INOUTCHI · PROFESSOR — Dashboard PC/Notebook
           Design: sidebar esquerda + conteúdo principal
        ================================================ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1a6fc4;
            --primary-light: #e8f2fc;
            --primary-dark: #0f4f8f;
            --cyan: #0ea5a0;
            --cyan-light: #e6f7f6;
            --grad-main: linear-gradient(135deg, #1a6fc4 0%, #0ea5a0 100%);
            --grad-card: linear-gradient(145deg, #ffffff 0%, #f8fbff 100%);
            --grad-bg: linear-gradient(180deg, #f4f8fd 0%, #eef7f6 60%, #f4f8fd 100%);

            --success: #10b981;
            --success-bg: #ecfdf5;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;

            --bg: #f0f5fb;
            --surface: #ffffff;
            --glass: rgba(255, 255, 255, .78);
            --border: rgba(15, 79, 143, .10);
            --border-strong: rgba(15, 79, 143, .18);

            --text: #0b2742;
            --text-secondary: #516583;
            --text-muted: #8395ad;

            --shadow-xs: 0 1px 3px rgba(15, 79, 143, .07);
            --shadow-sm: 0 4px 14px rgba(15, 79, 143, .09);
            --shadow-md: 0 10px 30px -8px rgba(15, 79, 143, .18);
            --shadow-lg: 0 24px 48px -12px rgba(15, 79, 143, .28);

            --sidebar-w: 240px;
            --topbar-h: 56px;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== LAYOUT SHELL ===== */
        .app-shell {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 40;
            transition: transform .3s cubic-bezier(.2, .9, .2, 1);
        }

        .sidebar-brand {
            height: var(--topbar-h);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--grad-main);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 800;
            font-size: .9rem;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .brand-text strong {
            display: block;
            font-size: .88rem;
            font-weight: 800;
            color: var(--text);
        }

        .brand-text span {
            display: block;
            font-size: .68rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            font-size: .84rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .2s ease;
            margin-bottom: 2px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            position: relative;
        }

        .nav-item svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }

        .nav-item:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--grad-main);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .nav-item .nav-badge {
            margin-left: auto;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .25);
            color: #fff;
            font-size: .68rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:not(.active) .nav-badge {
            background: var(--danger);
            color: #fff;
        }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer .nav-item {
            color: var(--danger);
        }

        .sidebar-footer .nav-item:hover {
            background: var(--danger-bg);
        }

        /* mobile sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 39;
            background: rgba(11, 39, 66, .4);
            backdrop-filter: blur(4px);
        }

        .sidebar-overlay.open {
            display: block;
        }

        /* ===== MAIN AREA ===== */
        .main-area {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== TOPBAR ===== */
        .topbar {
            height: var(--topbar-h);
            background: rgba(255, 255, 255, .85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
            z-index: 30;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-left h1 {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text);
        }

        .topbar-left p {
            font-size: .72rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all .2s;
            position: relative;
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        .icon-btn:hover {
            color: var(--primary);
            border-color: var(--primary-light);
            box-shadow: var(--shadow-xs);
        }

        .icon-btn .dot {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--danger);
            border: 2px solid #fff;
        }

        #btn-menu {
            display: none;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            scroll-behavior: smooth;
        }

        .content::-webkit-scrollbar {
            width: 5px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 4px;
        }

        .tab-pane {
            display: none;
            animation: fadeUp .3s ease both;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-inner {
            max-width: 960px;
        }

        .content-inner.wide {
            max-width: 1100px;
        }

        .content-inner.narrow {
            max-width: 680px;
        }

        /* ===== CTA BUTTON ===== */
        .btn-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 18px;
            height: 38px;
            background: var(--grad-main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: .84rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all .2s;
            font-family: inherit;
            margin-bottom: 20px;
        }

        .btn-cta:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-cta svg {
            width: 15px;
            height: 15px;
        }

        .btn {
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: .82rem;
            cursor: pointer;
            transition: all .2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--grad-main);
            color: #fff;
            box-shadow: 0 4px 12px rgba(26, 111, 196, .25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(26, 111, 196, .35);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        /* ===== MURAL GRID ===== */
        .mural-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
        }

        .mural-card {
            background: var(--grad-card);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent-color, var(--primary));
            border-radius: var(--radius-lg);
            padding: 16px;
            cursor: pointer;
            transition: all .22s ease;
            text-align: left;
        }

        .mural-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-strong);
            border-top-color: var(--accent-color, var(--primary));
        }

        .mural-card .icon-wrap {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--accent-bg, var(--primary-light));
            color: var(--accent-color, var(--primary));
            display: grid;
            place-items: center;
            margin-bottom: 10px;
        }

        .mural-card .icon-wrap svg {
            width: 20px;
            height: 20px;
        }

        .mural-card .card-name {
            font-size: .9rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .mural-card .card-sala {
            font-size: .72rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        .mural-card .card-preview {
            font-size: .74rem;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            min-height: 2em;
        }

        .mural-card .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .card-msgs {
            font-size: .68rem;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-msgs svg {
            width: 12px;
            height: 12px;
        }

        .badge-unread {
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            border-radius: 10px;
            background: var(--danger);
            color: #fff;
            font-size: .66rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 8px rgba(239, 68, 68, .35);
        }

        /* accent classes */
        .cat-mat {
            --accent-color: #8b5cf6;
            --accent-bg: #f3efff;
        }

        .cat-por {
            --accent-color: #0ea5a0;
            --accent-bg: #e6f7f6;
        }

        .cat-his {
            --accent-color: #ef4444;
            --accent-bg: #fef2f2;
        }

        .cat-geo {
            --accent-color: #f59e0b;
            --accent-bg: #fffbeb;
        }

        .cat-cie {
            --accent-color: #10b981;
            --accent-bg: #ecfdf5;
        }

        .cat-art {
            --accent-color: #ec4899;
            --accent-bg: #fdf2f8;
        }

        .cat-edu {
            --accent-color: #06b6d4;
            --accent-bg: #ecfeff;
        }

        .cat-def {
            --accent-color: #1a6fc4;
            --accent-bg: #e8f2fc;
        }

        /* ===== ALUNOS ===== */
        .turma-block {
            margin-bottom: 22px;
        }

        .turma-title {
            font-size: .69rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .turma-title svg {
            width: 13px;
            height: 13px;
        }

        .turma-pill {
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: .63rem;
        }

        .alunos-list {
            background: var(--grad-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-xs);
        }

        .aluno-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        .aluno-row:last-child {
            border-bottom: none;
        }

        .aluno-row:hover {
            background: rgba(26, 111, 196, .03);
        }

        .aluno-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--grad-main);
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: .9rem;
            flex-shrink: 0;
            box-shadow: var(--shadow-xs);
        }

        .aluno-nome {
            font-size: .86rem;
            font-weight: 700;
            color: var(--text);
        }

        .aluno-resp {
            font-size: .7rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 1px;
        }

        /* ===== CONFIGURAÇÕES ===== */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--grad-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: var(--grad-main);
            opacity: .04;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--grad-main);
            color: #fff;
            display: grid;
            place-items: center;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: var(--shadow-md);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .profile-info {
            position: relative;
            z-index: 1;
        }

        .profile-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        .profile-email {
            font-size: .76rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 2px;
        }

        .profile-role {
            display: inline-block;
            margin-top: 6px;
            font-size: .62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--primary);
            background: var(--primary-light);
            padding: 2px 8px;
            border-radius: 5px;
        }

        .config-section-label {
            font-size: .68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .config-list {
            background: var(--grad-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-xs);
            margin-bottom: 20px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
            transition: background .15s;
        }

        .config-row:last-child {
            border-bottom: none;
        }

        .config-row:hover {
            background: rgba(26, 111, 196, .03);
        }

        .config-row .row-icon {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .config-row .row-icon svg {
            width: 15px;
            height: 15px;
        }

        .config-row .row-label {
            font-size: .86rem;
            font-weight: 600;
            color: var(--text);
        }

        .config-row .row-desc {
            font-size: .7rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 1px;
        }

        .config-row .row-chev {
            margin-left: auto;
            color: var(--text-muted);
        }

        .config-row .row-chev svg {
            width: 14px;
            height: 14px;
        }

        .config-row.danger .row-label {
            color: var(--danger);
        }

        .config-row.danger:hover {
            background: var(--danger-bg);
        }

        /* ===== THREAD PANEL ===== */
        .thread-overlay {
            position: fixed;
            inset: 0;
            z-index: 80;
            background: rgba(11, 39, 66, .4);
            backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

        .thread-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .thread-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 460px;
            background: var(--bg);
            z-index: 90;
            transform: translateX(100%);
            transition: transform .32s cubic-bezier(.2, .9, .2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -20px 0 60px rgba(11, 39, 66, .2);
        }

        .thread-panel.open {
            transform: translateX(0);
        }

        .thread-head {
            height: var(--topbar-h);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            background: rgba(255, 255, 255, .9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .thread-icon {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .thread-icon svg {
            width: 16px;
            height: 16px;
        }

        .thread-head .title strong {
            display: block;
            font-size: .88rem;
            font-weight: 700;
            color: var(--text);
        }

        .thread-head .title span {
            font-size: .68rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .thread-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .thread-msg {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-xs);
        }

        .thread-msg.unread {
            border-left: 3px solid var(--primary);
            background: #fafcff;
        }

        .msg-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 5px;
        }

        .msg-from {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .msg-from svg {
            width: 12px;
            height: 12px;
            color: var(--text-muted);
        }

        .msg-when {
            font-size: .68rem;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        .msg-body {
            font-size: .82rem;
            color: var(--text-secondary);
            line-height: 1.5;
            font-weight: 500;
        }

        .msg-tag {
            display: inline-block;
            font-size: .62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            padding: 2px 7px;
            border-radius: 5px;
            margin-top: 7px;
            margin-right: 4px;
        }

        .tag-inst {
            background: var(--primary-light);
            color: var(--primary);
        }

        .tag-col {
            background: var(--cyan-light);
            color: var(--cyan);
        }

        .tag-ind {
            background: #f3efff;
            color: #8b5cf6;
        }

        /* ===== MODAL LATERAL NOVA MENSAGEM ===== */
        .modal-lateral {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 700px;
            height: 100vh;
            background: var(--surface);
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-radius: 0;
        }

        .modal-lateral.open {
            transform: translateX(0);
        }

        .modal-lateral-header {
            padding: 20px 24px;
            background: var(--grad-main);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-lateral-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-lateral-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-lateral-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--surface);
            flex-shrink: 0;
        }

        textarea.form-control {
            min-height: 200px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .anexos-area {
            margin-top: 16px;
            padding: 12px;
            background: #f8fafc;
            border-radius: var(--radius);
            border: 1px dashed var(--border);
        }

        .anexos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .anexo-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .anexo-item i.fa-times {
            color: var(--danger);
            cursor: pointer;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .loading-spinner-large {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        /* ===== TOAST ===== */
        .toast-tray {
            position: fixed;
            top: 68px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast-msg {
            background: rgba(255, 255, 255, .92);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text);
            box-shadow: var(--shadow-md);
            animation: toastIn .3s ease both;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 220px;
        }

        .toast-msg svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        .toast-msg.success {
            color: var(--success);
        }

        .toast-msg.danger {
            color: var(--danger);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(12px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 40;
                transform: translateX(-100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            #btn-menu {
                display: grid;
            }

            .topbar-left p {
                display: none;
            }

            .content {
                padding: 16px;
            }
        }

        @media (max-width: 520px) {
            .mural-grid {
                grid-template-columns: 1fr 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // ================================================
        // VARIÁVEIS GLOBAIS
        // ================================================
        let materiasDoProfessor = [];
        let salasDoProfessor = new Map();
        let anexosParaEnviar = [];
        let cloudinaryWidget = null;

        // ================================================
        // FUNÇÕES DE AUTENTICAÇÃO
        // ================================================
        async function getValidToken() {
            return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
        }

        async function fetchWithAuth(url, options = {}) {
            const token = await getValidToken();
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }
            const fullUrl = url.startsWith('http') ? url : CONFIG.API_URL + url;
            const defaultOptions = {
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            };
            const mergedOptions = { ...defaultOptions, ...options, headers: { ...defaultOptions.headers, ...options.headers } };
            const response = await fetch(fullUrl, mergedOptions);
            if (response.status === 401) {
                localStorage.clear(); sessionStorage.clear();
                window.location.href = 'login.html';
                return null;
            }
            return response;
        }

        // ================================================
        // DADOS DO PROFESSOR
        // ================================================
        async function carregarMateriasDoProfessor() {
            try {
                mostrarLoading(true);
                const response = await fetchWithAuth('/api/professores/materias');
                if (!response || !response.ok) throw new Error('Falha ao carregar matérias');
                materiasDoProfessor = await response.json();
                console.log('📚 Matérias do professor:', materiasDoProfessor);
                salasDoProfessor.clear();
                for (const materia of materiasDoProfessor) {
                    if (materia.salaId && !salasDoProfessor.has(materia.salaId)) {
                        salasDoProfessor.set(materia.salaId, { id: materia.salaId, nome: materia.salaNome, alunos: [] });
                    }
                }
                for (const [salaId, sala] of salasDoProfessor) {
                    await carregarAlunosDaSala(salaId, sala);
                }
                await renderMural();
            } catch (error) {
                console.error('Erro ao carregar matérias:', error);
                showToast('Erro ao carregar suas matérias.', 'danger');
            } finally { mostrarLoading(false); }
        }

        async function carregarAlunosDaSala(salaId, sala) {
            try {
                const response = await fetchWithAuth(`/api/materias/sala/${salaId}?page=0&size=100`);
                if (!response || !response.ok) { console.warn(`Falha ao carregar alunos da sala ${salaId}`); return; }
                const data = await response.json();
                sala.alunos = (data.content || []).map(a => ({ id: a.id, nome: a.nome, status: a.status }));
                console.log(`👨‍🎓 Sala ${sala.nome}: ${sala.alunos.length} alunos`);
            } catch (error) { console.error(`Erro carregar alunos sala ${salaId}:`, error); }
        }

        // ================================================
        // RENDER MURAL
        // ================================================
        async function renderMural() {
            const grid = document.getElementById('muralGrid');
            if (!grid) { console.error('❌ muralGrid não encontrado'); return; }
            if (!materiasDoProfessor.length) {
                grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-ic"><i class="fas fa-chalkboard-teacher"></i></div><div class="empty-t">Nenhuma matéria vinculada</div><div class="empty-s">Você não está vinculado a nenhuma disciplina. Contate a coordenação.</div></div>`;
                return;
            }
            let cardsHtml = '';
            for (const materia of materiasDoProfessor) {
                const cat = getMateriaCategoria(materia.nome);
                cardsHtml += `<button class="mural-card ${cat.cssClass}" onclick="abrirThreadMateria(${materia.id}, '${escapeHtml(materia.nome)}', ${materia.salaId})">
                <div class="icon-wrap"><i class="fas ${cat.icon}"></i></div>
                <div class="card-name">${escapeHtml(materia.nome)}</div>
                <div class="card-sala">${escapeHtml(materia.salaNome)}</div>
                <div class="card-preview">Clique para ver as mensagens</div>
                <div class="card-meta"><span class="card-msgs"><i class="fas fa-envelope"></i> Carregando...</span></div>
            </button>`;
            }
            grid.innerHTML = cardsHtml;
            await carregarContagemMensagens();
        }

        function getMateriaCategoria(nome) {
            const up = (nome || '').toUpperCase();
            if (up.includes('MATEM')) return { cssClass: 'cat-mat', icon: 'fa-square-root-variable' };
            if (up.includes('PORT') || up.includes('LING')) return { cssClass: 'cat-por', icon: 'fa-book-open' };
            if (up.includes('HIST')) return { cssClass: 'cat-his', icon: 'fa-landmark' };
            if (up.includes('GEOG')) return { cssClass: 'cat-geo', icon: 'fa-globe' };
            if (up.includes('CIEN')) return { cssClass: 'cat-cie', icon: 'fa-flask' };
            if (up.includes('ART')) return { cssClass: 'cat-art', icon: 'fa-palette' };
            if (up.includes('FIS') || up.includes('EDU')) return { cssClass: 'cat-edu', icon: 'fa-person-running' };
            return { cssClass: 'cat-def', icon: 'fa-chalkboard-user' };
        }

        async function carregarContagemMensagens() {
            for (const materia of materiasDoProfessor) {
                try {
                    const res = await fetchWithAuth(`/api/mensagens/materia/${materia.id}`);
                    if (res && res.ok) {
                        const msgs = await res.json();
                        const card = document.querySelector(`.mural-card[onclick*="${materia.id}"]`);
                        if (card) {
                            const span = card.querySelector('.card-meta span');
                            if (span) span.innerHTML = `<i class="fas fa-envelope"></i> ${msgs.length} mensagem(ns)`;
                        }
                    }
                } catch (e) { console.warn(`Erro contagem ${materia.nome}:`, e); }
            }
        }

        // ================================================
        // THREAD
        // ================================================
        async function abrirThreadMateria(materiaId, materiaNome, salaId) {
            mostrarLoading(true);
            try {
                const res = await fetchWithAuth(`/api/mensagens/materia/${materiaId}`);
                if (!res || !res.ok) throw new Error('Erro ao carregar mensagens');
                const mensagens = await res.json();
                document.getElementById('threadTitle').textContent = materiaNome;
                document.getElementById('threadSub').textContent = `Mensagens da disciplina`;
                const icone = getMateriaCategoria(materiaNome);
                document.getElementById('threadIcon').innerHTML = `<i class="fas ${icone.icon}"></i>`;
                const body = document.getElementById('threadBody');
                if (!mensagens.length) {
                    body.innerHTML = `<div class="empty"><div class="empty-ic"><i class="fas fa-comment-dots"></i></div><div class="empty-t">Nenhuma mensagem</div><div class="empty-s">Ainda não há mensagens.</div></div>`;
                } else {
                    body.innerHTML = mensagens.map(msg => {
                        let tipoIcon = msg.tipo === 'COLETIVA' ? '👥' : (msg.tipo === 'INSTITUCIONAL' ? '🏛️' : '👤');
                        return `<article class="thread-msg ${!msg.lida ? 'unread' : ''}">
                        <div class="msg-head"><span class="msg-from">${tipoIcon} ${escapeHtml(msg.criadoPorNome || 'Sistema')}</span><span class="msg-when">${new Date(msg.dataCriacao).toLocaleString('pt-BR')}</span></div>
                        <div class="msg-body">${formatarMensagem(msg.conteudo)}</div>
                        ${msg.alunoNome ? `<div class="msg-tag"><i class="fas fa-user"></i> Para: ${escapeHtml(msg.alunoNome)}</div>` : ''}
                        ${msg.anexos?.length ? `<div class="msg-attachments" style="margin-top:10px;"><i class="fas fa-paperclip"></i> Anexos: ${msg.anexos.map(a => `<a href="${a.caminhoArquivo}" target="_blank">${a.nomeArquivo}</a>`).join(', ')}</div>` : ''}
                    </article>`;
                    }).join('');
                }
                document.getElementById('threadOverlay').classList.add('open');
                document.getElementById('threadPanel').classList.add('open');
            } catch (e) { console.error(e); showToast('Erro ao carregar mensagens', 'danger'); }
            finally { mostrarLoading(false); }
        }

        function formatarMensagem(texto) {
            if (!texto) return '';
            texto = texto.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
            texto = texto.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            texto = texto.replace(/\*(.*?)\*/g, '<em>$1</em>');
            return texto.replace(/\n/g, '<br>');
        }

        // ================================================
        // MODAL NOVA MENSAGEM
        // ================================================
        function abrirNovaMsgModal() {
            document.getElementById('novaMsgForm').reset();
            document.getElementById('msgConteudo').value = '';
            anexosParaEnviar = [];
            document.getElementById('anexosArea').style.display = 'none';
            const materiaSelect = document.getElementById('msgMateria');
            materiaSelect.innerHTML = '<option value="">Selecione uma matéria...</option>';
            materiasDoProfessor.forEach(m => { materiaSelect.innerHTML += `<option value="${m.id}" data-sala-id="${m.salaId}" data-sala-nome="${escapeHtml(m.salaNome)}">${escapeHtml(m.nome)} (${escapeHtml(m.salaNome)})</option>`; });
            const salaSelect = document.getElementById('msgSala');
            salaSelect.innerHTML = '<option value="">Selecione uma turma...</option>';
            for (const [id, sala] of salasDoProfessor) { salaSelect.innerHTML += `<option value="${id}">${escapeHtml(sala.nome)}</option>`; }
            materiaSelect.onchange = () => {
                const opt = materiaSelect.options[materiaSelect.selectedIndex];
                const salaId = opt.dataset.salaId;
                if (salaId) { salaSelect.value = salaId; carregarAlunosParaSelect(salaId); }
            };
            salaSelect.onchange = () => { if (salaSelect.value) carregarAlunosParaSelect(salaSelect.value); };
            document.getElementById('novaMsgModal').classList.add('open');
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeNovaMsgModal() {
            document.getElementById('novaMsgModal').classList.remove('open');
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function carregarAlunosParaSelect(salaId) {
            const alunoSelect = document.getElementById('msgAluno');
            alunoSelect.innerHTML = '<option value="">Carregando alunos...</option>';
            const sala = salasDoProfessor.get(parseInt(salaId));
            if (sala?.alunos.length) {
                alunoSelect.innerHTML = '<option value="">Selecione um aluno...</option>';
                sala.alunos.forEach(a => alunoSelect.innerHTML += `<option value="${a.id}">${escapeHtml(a.nome)}</option>`);
            } else { alunoSelect.innerHTML = '<option value="">Nenhum aluno nesta turma</option>'; }
        }

        function toggleCamposPorTipo() {
            const tipo = document.getElementById('msgTipo').value;
            document.getElementById('alunoGroup').style.display = tipo === 'INDIVIDUAL' ? 'block' : 'none';
            document.getElementById('msgAluno').required = tipo === 'INDIVIDUAL';
        }

        // ================================================
        // UPLOAD E ENVIO
        // ================================================
        function abrirUploadAnexo() {
            if (!cloudinaryWidget) {
                cloudinaryWidget = cloudinary.createUploadWidget({
                    cloudName: CONFIG.CLOUDINARY.CLOUD_NAME,
                    uploadPreset: CONFIG.CLOUDINARY.UPLOAD_PRESET,
                    folder: CONFIG.CLOUDINARY.FOLDER,
                    sources: ['local', 'url', 'camera'],
                    multiple: true, maxFiles: 5, maxFileSize: 10485760,
                    clientAllowedFormats: ['pdf', 'jpg', 'jpeg', 'png', 'gif'],
                    resourceType: 'auto'
                }, (error, result) => {
                    if (error) { console.error(error); showToast('Erro no upload', 'danger'); return; }
                    if (result?.event === 'success') {
                        anexosParaEnviar.push({ nome: result.info.original_filename, url: result.info.secure_url, publicId: result.info.public_id, tipo: result.info.resource_type });
                        atualizarListaAnexos();
                        showToast(`Anexo adicionado: ${result.info.original_filename}`, 'success');
                    }
                });
            }
            cloudinaryWidget.open();
        }

        function atualizarListaAnexos() {
            const area = document.getElementById('anexosArea');
            const container = document.getElementById('anexosList');
            if (!anexosParaEnviar.length) { area.style.display = 'none'; return; }
            area.style.display = 'block';
            container.innerHTML = anexosParaEnviar.map((a, i) => `<span class="anexo-item"><i class="fas ${a.tipo === 'image' ? 'fa-image' : 'fa-file-pdf'}"></i> ${a.nome} <i class="fas fa-times" onclick="removerAnexo(${i})"></i></span>`).join('');
        }

        function removerAnexo(idx) { anexosParaEnviar.splice(idx, 1); atualizarListaAnexos(); }

        async function enviarMensagem() {
            const tipo = document.getElementById('msgTipo').value;
            const materiaId = document.getElementById('msgMateria').value;
            const salaId = document.getElementById('msgSala').value;
            const alunoId = document.getElementById('msgAluno').value;
            const conteudo = document.getElementById('msgConteudo').value.trim();
            if (!materiaId) { showToast('Selecione uma matéria', 'danger'); return; }
            if (!salaId) { showToast('Selecione uma turma', 'danger'); return; }
            if (tipo === 'INDIVIDUAL' && !alunoId) { showToast('Selecione um aluno', 'danger'); return; }
            if (!conteudo) { showToast('Digite o conteúdo', 'danger'); return; }
            mostrarLoading(true);
            try {
                const payload = { conteudo, materiaId: parseInt(materiaId), tipo, salaId: tipo === 'COLETIVA' ? parseInt(salaId) : null, alunoId: tipo === 'INDIVIDUAL' ? parseInt(alunoId) : null };
                const inicio = document.getElementById('msgDataInicio').value;
                const fim = document.getElementById('msgDataFim').value;
                if (inicio) payload.dataExibicaoInicio = new Date(inicio).toISOString();
                if (fim) payload.dataExibicaoFim = new Date(fim).toISOString();
                const res = await fetchWithAuth('/api/mensagens', { method: 'POST', body: JSON.stringify(payload) });
                if (!res || !res.ok) { const err = await res.json(); throw new Error(err.mensagem || 'Erro ao enviar'); }
                const msgCriada = await res.json();
                if (anexosParaEnviar.length) {
                    for (const a of anexosParaEnviar) {
                        await fetchWithAuth(`/api/mensagens/${msgCriada.id}/anexos`, { method: 'POST', body: JSON.stringify({ nomeArquivo: a.nome, caminhoArquivo: a.url, tipoArquivo: a.tipo, tamanho: 0 }) });
                    }
                }
                showToast('Mensagem enviada com sucesso!', 'success');
                closeNovaMsgModal();
                if (document.getElementById('threadPanel').classList.contains('open')) {
                    const materiaAtual = materiasDoProfessor.find(m => m.nome === document.getElementById('threadTitle').textContent);
                    if (materiaAtual) await abrirThreadMateria(materiaAtual.id, materiaAtual.nome, materiaAtual.salaId);
                }
            } catch (e) { console.error(e); showToast(e.message, 'danger'); }
            finally { mostrarLoading(false); }
        }

        // ================================================
        // UTILITÁRIOS
        // ================================================
        function escapeHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function showToast(msg, type = '') {
            const tray = document.getElementById('toastTray');
            if (!tray) return;
            const el = document.createElement('div');
            el.className = `toast-msg ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'danger' ? 'fa-exclamation-triangle' : 'fa-info-circle');
            el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
            tray.appendChild(el);
            setTimeout(() => { el.style.transition = 'all .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
        }
        function mostrarLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function handleLogout() { if (confirm('Deseja sair?')) { localStorage.clear(); sessionStorage.clear(); window.location.href = 'login.html'; } }
        function switchTab(tab) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.getElementById(`tab-${tab}`)?.classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');
            const titles = { mural: ['Meu Mural', 'Acompanhe as comunicações'], alunos: ['Meus Alunos', 'Visualize seus alunos'], config: ['Configurações', 'Gerencie seu perfil'] };
            document.getElementById('topbarTitle').textContent = titles[tab]?.[0] || 'Dashboard';
            document.getElementById('topbarSub').textContent = titles[tab]?.[1] || '';
        }
        function openSidebar() { document.getElementById('sidebar').classList.add('mobile-open'); document.getElementById('sidebarOverlay').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
        function closeThread() { document.getElementById('threadOverlay').classList.remove('open'); document.getElementById('threadPanel').classList.remove('open'); }

        // ================================================
        // INIT
        // ================================================
        document.addEventListener('DOMContentLoaded', async () => {
            const token = await getValidToken();
            if (!token) { window.location.href = 'login.html'; return; }
            await carregarMateriasDoProfessor();
            document.querySelector('.btn-cta')?.addEventListener('click', abrirNovaMsgModal);
            document.querySelector('#btn-header-logout')?.addEventListener('click', handleLogout);
            document.getElementById('threadOverlay')?.addEventListener('click', closeThread);
            document.getElementById('threadBack')?.addEventListener('click', closeThread);
            console.log('✅ Dashboard inicializado');
        });
    </script>
</body>
