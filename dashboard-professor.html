<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a6fc4">
    <title>Inoutchi · Professor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Cloudinary SDK para upload de arquivos -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        /* [MANTENHA TODOS OS ESTILOS EXISTENTES AQUI - Não vou repetir para economizar espaço] */
        /* Copie todo o CSS do seu dashboard-professor.html original aqui */

        /* ESTILOS ADICIONAIS PARA O MODAL LATERAL E CAMPO DE MENSAGEM */
        .modal-lateral {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            max-width: 700px;
            height: 100vh;
            background: var(--surface);
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
            border-radius: 0;
        }

        .modal-lateral.open {
            transform: translateX(0);
        }

        .modal-lateral-header {
            padding: 20px 24px;
            background: var(--grad-main);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-lateral-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-lateral-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-lateral-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--surface);
            flex-shrink: 0;
        }

        /* Campo de mensagem expandido */
        textarea.form-control {
            min-height: 200px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Área de anexos */
        .anexos-area {
            margin-top: 16px;
            padding: 12px;
            background: #f8fafc;
            border-radius: var(--radius);
            border: 1px dashed var(--border);
        }

        .anexos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .anexo-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .anexo-item i {
            color: var(--danger);
            cursor: pointer;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1100;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .loading-spinner-large {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Garantir que o mural grid seja visível */
        .mural-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)) !important;
            gap: 16px !important;
            min-height: 200px;
        }

        .tab-pane.active {
            display: block !important;
        }

        #tab-mural {
            display: block;
        }
    </style>
</head>

<body>
    <!-- [MANTENHA A ESTRUTURA HTML EXISTENTE ATÉ O FINAL DO MODAL ORIGINAL] -->
    <!-- Copie todo o HTML do seu dashboard-professor.html original aqui -->

    <!-- ===== MODAL LATERAL NOVA MENSAGEM (SUBSTITUI O MODAL ANTIGO) ===== -->
    <div id="novaMsgModal" class="modal-lateral">
        <div class="modal-lateral-header">
            <h3>
                <i class="fas fa-pen-alt"></i>
                Nova Mensagem
            </h3>
            <button class="icon-btn" onclick="closeNovaMsgModal()"
                style="background: rgba(255,255,255,0.2); color: white;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="novaMsgForm" class="modal-lateral-body">
            <!-- Tipo de Mensagem -->
            <div class="form-group">
                <label class="form-label">Tipo de mensagem</label>
                <select id="msgTipo" class="form-select" onchange="toggleCamposPorTipo()" required>
                    <option value="COLETIVA">👥 Coletiva (toda a turma)</option>
                    <option value="INDIVIDUAL">👤 Individual (um aluno)</option>
                </select>
            </div>

            <!-- Matéria -->
            <div class="form-group">
                <label class="form-label">Matéria / Disciplina</label>
                <select id="msgMateria" class="form-select" required>
                    <option value="">Carregando matérias...</option>
                </select>
            </div>

            <!-- Turma (Sala) -->
            <div class="form-group">
                <label class="form-label">Turma / Sala</label>
                <select id="msgSala" class="form-select" required>
                    <option value="">Selecione uma turma...</option>
                </select>
            </div>

            <!-- Aluno (aparece apenas para INDIVIDUAL) -->
            <div class="form-group" id="alunoGroup" style="display: none;">
                <label class="form-label">Aluno</label>
                <select id="msgAluno" class="form-select">
                    <option value="">Carregando alunos...</option>
                </select>
            </div>

            <!-- Conteúdo da Mensagem (Campo expandido) -->
            <div class="form-group">
                <label class="form-label">Conteúdo da Mensagem</label>
                <textarea id="msgConteudo" class="form-control" rows="8"
                    placeholder="Digite sua mensagem aqui... Utilize **negrito**, *itálico* ou links como https://..."></textarea>
            </div>

            <!-- Anexos (com upload via Cloudinary) -->
            <div class="form-group">
                <label class="form-label">Anexos (opcional)</label>
                <button type="button" class="btn btn-secondary" onclick="abrirUploadAnexo()" id="btnUploadAnexo">
                    <i class="fas fa-paperclip"></i> Adicionar arquivo
                </button>
                <div class="anexos-area" id="anexosArea" style="display: none;">
                    <small><i class="fas fa-paperclip"></i> Arquivos anexados:</small>
                    <div class="anexos-list" id="anexosList"></div>
                </div>
                <small class="form-hint">Formatos suportados: PDF, JPG, PNG, GIF. Tamanho máximo: 10MB por
                    arquivo.</small>
            </div>

            <!-- Agendamento opcional -->
            <div class="form-row">
                <div class="form-group half">
                    <label class="form-label">Publicar a partir de (opcional)</label>
                    <input type="datetime-local" id="msgDataInicio" class="form-control">
                </div>
                <div class="form-group half">
                    <label class="form-label">Expirar em (opcional)</label>
                    <input type="datetime-local" id="msgDataFim" class="form-control">
                </div>
            </div>
        </form>

        <div class="modal-lateral-footer">
            <button type="button" class="btn btn-secondary" onclick="closeNovaMsgModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="enviarMensagem()">
                <i class="fas fa-paper-plane"></i> Publicar Mensagem
            </button>
        </div>
    </div>

    <!-- Overlay para o modal lateral -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeNovaMsgModal()"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner-large"></div>
    </div>

    <script src="config.js"></script>
    <script>
        // ================================================
        // VARIÁVEIS GLOBAIS
        // ================================================
        let materiasDoProfessor = [];      // Matérias vinculadas ao professor
        let salasDoProfessor = new Map();   // Map de salaId -> { nome, alunos }
        let anexosParaEnviar = [];          // Lista de arquivos a serem anexados

        // ================================================
        // FUNÇÕES DE AUTENTICAÇÃO (usando auth.js)
        // ================================================
        async function getValidToken() {
            // Usar a mesma lógica do auth.js
            return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
        }

        async function fetchWithAuth(url, options = {}) {
            const token = await getValidToken();
            if (!token) {
                window.location.href = 'login.html';
                return null;
            }

            const fullUrl = url.startsWith('http') ? url : CONFIG.API_URL + url;

            const defaultOptions = {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            };

            const mergedOptions = {
                ...defaultOptions,
                ...options,
                headers: { ...defaultOptions.headers, ...options.headers }
            };

            const response = await fetch(fullUrl, mergedOptions);

            if (response.status === 401) {
                // Token expirado
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = 'login.html';
                return null;
            }

            return response;
        }

        // ================================================
        // CARREGAR DADOS DO PROFESSOR LOGADO
        // ================================================
        async function carregarMateriasDoProfessor() {
            try {
                mostrarLoading(true);
                const response = await fetchWithAuth('/api/professores/materias');

                if (!response || !response.ok) {
                    throw new Error('Falha ao carregar matérias');
                }

                const materias = await response.json();
                console.log('📚 Matérias do professor:', materias);

                materiasDoProfessor = materias;

                // Extrair salas únicas das matérias
                salasDoProfessor.clear();
                materias.forEach(materia => {
                    if (materia.salaId && !salasDoProfessor.has(materia.salaId)) {
                        salasDoProfessor.set(materia.salaId, {
                            id: materia.salaId,
                            nome: materia.salaNome,
                            alunos: []
                        });
                    }
                });

                // Para cada sala, carregar seus alunos
                for (const [salaId, sala] of salasDoProfessor) {
                    await carregarAlunosDaSala(salaId, sala);
                }

                // Renderizar o mural
                await renderMural();

            } catch (error) {
                console.error('Erro ao carregar matérias:', error);
                showToast('Erro ao carregar suas matérias. Tente novamente.', 'danger');
            } finally {
                mostrarLoading(false);
            }
        }

        // ================================================
        // CARREGAR ALUNOS DE UMA SALA ESPECÍFICA
        // ================================================
        async function carregarAlunosDaSala(salaId, sala) {
            try {
                const response = await fetchWithAuth(`/api/materias/sala/${salaId}?page=0&size=100`);

                if (!response || !response.ok) {
                    console.warn(`Falha ao carregar alunos da sala ${salaId}`);
                    return;
                }

                const data = await response.json();
                const alunos = data.content || [];

                sala.alunos = alunos.map(aluno => ({
                    id: aluno.id,
                    nome: aluno.nome,
                    status: aluno.status
                }));

                console.log(`👨‍🎓 Sala ${sala.nome}: ${sala.alunos.length} alunos`);

            } catch (error) {
                console.error(`Erro ao carregar alunos da sala ${salaId}:`, error);
            }
        }

        // ================================================
        // RENDERIZAR MURAL (Cards de Matérias) - VERSÃO CORRIGIDA
        // ================================================
        async function renderMural() {
            const grid = document.getElementById('muralGrid');
            if (!grid) {
                console.error('❌ Elemento muralGrid não encontrado!');
                return;
            }

            console.log('🎨 Renderizando mural, matérias:', materiasDoProfessor);

            if (!materiasDoProfessor || materiasDoProfessor.length === 0) {
                grid.innerHTML = `
            <div class="empty" style="grid-column:1/-1">
                <div class="empty-ic"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="empty-t">Nenhuma matéria vinculada</div>
                <div class="empty-s">Você não está vinculado a nenhuma disciplina ainda. Entre em contato com a coordenação.</div>
            </div>
        `;
                return;
            }

            // Gerar HTML dos cards
            let cardsHtml = '';

            for (const materia of materiasDoProfessor) {
                const categoria = getMateriaCategoria(materia.nome);

                cardsHtml += `
            <button class="mural-card ${categoria.cssClass}" onclick="abrirThreadMateria(${materia.id}, '${escapeHtml(materia.nome)}', ${materia.salaId})">
                <div class="icon-wrap">
                    <i class="fas ${categoria.icon}"></i>
                </div>
                <div class="card-name">${escapeHtml(materia.nome)}</div>
                <div class="card-sala">${escapeHtml(materia.salaNome)}</div>
                <div class="card-preview">Clique para ver as mensagens desta disciplina</div>
                <div class="card-meta">
                    <span class="card-msgs">
                        <i class="fas fa-envelope"></i> Carregando...
                    </span>
                </div>
            </button>
        `;
            }

            grid.innerHTML = cardsHtml;
            console.log('✅ Mural renderizado com', materiasDoProfessor.length, 'cards');

            // Carregar contagem de mensagens para cada matéria
            await carregarContagemMensagens();
        }

        // Função auxiliar para categoria da matéria (cores e ícones)
        function getMateriaCategoria(nome) {
            const nomeUpper = (nome || '').toUpperCase();

            if (nomeUpper.includes('MATEM') || nomeUpper.includes('MATH')) {
                return { cssClass: 'cat-mat', icon: 'fa-square-root-variable' };
            }
            if (nomeUpper.includes('PORT') || nomeUpper.includes('LING') || nomeUpper.includes('GRAM')) {
                return { cssClass: 'cat-por', icon: 'fa-book-open' };
            }
            if (nomeUpper.includes('HIST')) {
                return { cssClass: 'cat-his', icon: 'fa-landmark' };
            }
            if (nomeUpper.includes('GEOG')) {
                return { cssClass: 'cat-geo', icon: 'fa-globe' };
            }
            if (nomeUpper.includes('CIEN') || nomeUpper.includes('BIO')) {
                return { cssClass: 'cat-cie', icon: 'fa-flask' };
            }
            if (nomeUpper.includes('ART')) {
                return { cssClass: 'cat-art', icon: 'fa-palette' };
            }
            if (nomeUpper.includes('FIS') || nomeUpper.includes('EDU')) {
                return { cssClass: 'cat-edu', icon: 'fa-person-running' };
            }

            return { cssClass: 'cat-def', icon: 'fa-chalkboard-user' };
        }

        // Carregar contagem de mensagens para cada matéria
        async function carregarContagemMensagens() {
            for (const materia of materiasDoProfessor) {
                try {
                    const response = await fetchWithAuth(`/api/mensagens/materia/${materia.id}`);
                    if (response && response.ok) {
                        const mensagens = await response.json();
                        const total = mensagens.length;

                        // Atualizar o card correspondente
                        const card = document.querySelector(`.mural-card[onclick*="${materia.id}"]`);
                        if (card) {
                            const metaSpan = card.querySelector('.card-meta span');
                            if (metaSpan) {
                                metaSpan.innerHTML = `<i class="fas fa-envelope"></i> ${total} mensagem(ns)`;
                            }
                        }
                    }
                } catch (error) {
                    console.warn(`Erro ao carregar mensagens para ${materia.nome}:`, error);
                }
            }
        }

        // ================================================
        // ABRIR THREAD (MENSAGENS DE UMA MATÉRIA)
        // ================================================
        async function abrirThreadMateria(materiaId, materiaNome, salaId) {
            mostrarLoading(true);

            try {
                const response = await fetchWithAuth(`/api/mensagens/materia/${materiaId}`);

                if (!response || !response.ok) {
                    throw new Error('Erro ao carregar mensagens');
                }

                const mensagens = await response.json();

                // Atualizar cabeçalho do thread panel
                document.getElementById('threadTitle').textContent = materiaNome;
                document.getElementById('threadSub').textContent = `Mensagens da disciplina`;

                const icone = getMateriaCategoria(materiaNome);
                document.getElementById('threadIcon').innerHTML = `<i class="fas ${icone.icon}"></i>`;

                // Renderizar mensagens
                const body = document.getElementById('threadBody');

                if (mensagens.length === 0) {
                    body.innerHTML = `
                        <div class="empty">
                            <div class="empty-ic"><i class="fas fa-comment-dots"></i></div>
                            <div class="empty-t">Nenhuma mensagem</div>
                            <div class="empty-s">Ainda não há mensagens para esta disciplina.</div>
                        </div>
                    `;
                } else {
                    body.innerHTML = mensagens.map(msg => {
                        const isLida = msg.lida || false;
                        let tipoIcon = msg.tipo === 'COLETIVA' ? '👥' : (msg.tipo === 'INSTITUCIONAL' ? '🏛️' : '👤');

                        return `
                            <article class="thread-msg ${!isLida ? 'unread' : ''}">
                                <div class="msg-head">
                                    <span class="msg-from">
                                        ${tipoIcon} ${escapeHtml(msg.criadoPorNome || 'Sistema')}
                                    </span>
                                    <span class="msg-when">${new Date(msg.dataCriacao).toLocaleString('pt-BR')}</span>
                                </div>
                                <div class="msg-body">${formatarMensagem(msg.conteudo)}</div>
                                ${msg.alunoNome ? `<div class="msg-tag"><i class="fas fa-user"></i> Para: ${escapeHtml(msg.alunoNome)}</div>` : ''}
                                ${msg.anexos && msg.anexos.length > 0 ? `
                                    <div class="msg-attachments" style="margin-top: 10px;">
                                        <i class="fas fa-paperclip"></i> Anexos:
                                        ${msg.anexos.map(anexo => `
                                            <a href="${anexo.caminhoArquivo}" target="_blank" class="anexo-link">${anexo.nomeArquivo}</a>
                                        `).join(', ')}
                                    </div>
                                ` : ''}
                            </article>
                        `;
                    }).join('');
                }

                // Abrir modal
                document.getElementById('threadOverlay').classList.add('open');
                document.getElementById('threadPanel').classList.add('open');

            } catch (error) {
                console.error('Erro ao abrir thread:', error);
                showToast('Erro ao carregar mensagens', 'danger');
            } finally {
                mostrarLoading(false);
            }
        }

        // Função para formatar mensagem com markdown simples
        function formatarMensagem(texto) {
            if (!texto) return '';

            // Links para HTML
            texto = texto.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');

            // Negrito (**texto**)
            texto = texto.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // Itálico (*texto*)
            texto = texto.replace(/\*(.*?)\*/g, '<em>$1</em>');

            // Quebras de linha
            texto = texto.replace(/\n/g, '<br>');

            return texto;
        }

        // ================================================
        // MODAL NOVA MENSAGEM
        // ================================================
        function abrirNovaMsgModal() {
            // Limpar formulário
            document.getElementById('novaMsgForm').reset();
            document.getElementById('msgConteudo').value = '';
            anexosParaEnviar = [];
            document.getElementById('anexosArea').style.display = 'none';
            document.getElementById('anexosList').innerHTML = '';

            // Preencher matérias do professor
            const materiaSelect = document.getElementById('msgMateria');
            materiaSelect.innerHTML = '<option value="">Selecione uma matéria...</option>';

            materiasDoProfessor.forEach(materia => {
                materiaSelect.innerHTML += `<option value="${materia.id}" data-sala-id="${materia.salaId}" data-sala-nome="${escapeHtml(materia.salaNome)}">${escapeHtml(materia.nome)} (${escapeHtml(materia.salaNome)})</option>`;
            });

            // Preencher turmas únicas
            const salaSelect = document.getElementById('msgSala');
            salaSelect.innerHTML = '<option value="">Selecione uma turma...</option>';

            for (const [salaId, sala] of salasDoProfessor) {
                salaSelect.innerHTML += `<option value="${salaId}">${escapeHtml(sala.nome)}</option>`;
            }

            // Configurar evento de mudança da matéria
            materiaSelect.onchange = () => {
                const selectedOption = materiaSelect.options[materiaSelect.selectedIndex];
                const salaId = selectedOption.dataset.salaId;
                if (salaId) {
                    salaSelect.value = salaId;
                    carregarAlunosParaSelect(salaId);
                }
            };

            // Configurar evento de mudança da turma
            salaSelect.onchange = () => {
                const salaId = salaSelect.value;
                if (salaId) {
                    carregarAlunosParaSelect(salaId);
                }
            };

            // Abrir modal lateral
            document.getElementById('novaMsgModal').classList.add('open');
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeNovaMsgModal() {
            document.getElementById('novaMsgModal').classList.remove('open');
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Carregar alunos para o select baseado na sala
        async function carregarAlunosParaSelect(salaId) {
            const alunoSelect = document.getElementById('msgAluno');
            alunoSelect.innerHTML = '<option value="">Carregando alunos...</option>';

            const sala = salasDoProfessor.get(parseInt(salaId));
            if (sala && sala.alunos.length > 0) {
                alunoSelect.innerHTML = '<option value="">Selecione um aluno...</option>';
                sala.alunos.forEach(aluno => {
                    alunoSelect.innerHTML += `<option value="${aluno.id}">${escapeHtml(aluno.nome)}</option>`;
                });
            } else {
                alunoSelect.innerHTML = '<option value="">Nenhum aluno encontrado nesta turma</option>';
            }
        }

        // Mostrar/esconder campo de aluno baseado no tipo
        function toggleCamposPorTipo() {
            const tipo = document.getElementById('msgTipo').value;
            const alunoGroup = document.getElementById('alunoGroup');
            alunoGroup.style.display = tipo === 'INDIVIDUAL' ? 'block' : 'none';

            if (tipo === 'INDIVIDUAL') {
                document.getElementById('msgAluno').required = true;
            } else {
                document.getElementById('msgAluno').required = false;
            }
        }

        // ================================================
        // UPLOAD DE ANEXOS COM CLOUDINARY
        // ================================================
        let cloudinaryWidget = null;

        function abrirUploadAnexo() {
            if (!cloudinaryWidget) {
                cloudinaryWidget = cloudinary.createUploadWidget(
                    {
                        cloudName: CONFIG.CLOUDINARY.CLOUD_NAME,
                        uploadPreset: CONFIG.CLOUDINARY.UPLOAD_PRESET,
                        folder: CONFIG.CLOUDINARY.FOLDER,
                        sources: ['local', 'url', 'camera'],
                        multiple: true,
                        maxFiles: 5,
                        maxFileSize: 10485760, // 10MB
                        clientAllowedFormats: ['pdf', 'jpg', 'jpeg', 'png', 'gif'],
                        resourceType: 'auto'
                    },
                    (error, result) => {
                        if (error) {
                            console.error('Erro no upload:', error);
                            showToast('Erro ao fazer upload do arquivo', 'danger');
                            return;
                        }

                        if (result && result.event === 'success') {
                            const fileInfo = result.info;
                            anexosParaEnviar.push({
                                nome: fileInfo.original_filename,
                                url: fileInfo.secure_url,
                                publicId: fileInfo.public_id,
                                tipo: fileInfo.resource_type
                            });

                            atualizarListaAnexos();
                            showToast(`Anexo adicionado: ${fileInfo.original_filename}`, 'success');
                        }
                    }
                );
            }

            cloudinaryWidget.open();
        }

        function atualizarListaAnexos() {
            const container = document.getElementById('anexosList');
            const area = document.getElementById('anexosArea');

            if (anexosParaEnviar.length === 0) {
                area.style.display = 'none';
                return;
            }

            area.style.display = 'block';
            container.innerHTML = anexosParaEnviar.map((anexo, index) => `
                <span class="anexo-item">
                    <i class="fas ${anexo.tipo === 'image' ? 'fa-image' : 'fa-file-pdf'}"></i>
                    ${anexo.nome}
                    <i class="fas fa-times" onclick="removerAnexo(${index})"></i>
                </span>
            `).join('');
        }

        function removerAnexo(index) {
            anexosParaEnviar.splice(index, 1);
            atualizarListaAnexos();
        }

        // ================================================
        // ENVIAR MENSAGEM
        // ================================================
        async function enviarMensagem() {
            const tipo = document.getElementById('msgTipo').value;
            const materiaId = document.getElementById('msgMateria').value;
            const salaId = document.getElementById('msgSala').value;
            const alunoId = document.getElementById('msgAluno').value;
            const conteudo = document.getElementById('msgConteudo').value.trim();
            const dataInicio = document.getElementById('msgDataInicio').value;
            const dataFim = document.getElementById('msgDataFim').value;

            // Validações
            if (!materiaId) {
                showToast('Selecione uma matéria', 'danger');
                return;
            }

            if (!salaId) {
                showToast('Selecione uma turma', 'danger');
                return;
            }

            if (tipo === 'INDIVIDUAL' && !alunoId) {
                showToast('Selecione um aluno para mensagem individual', 'danger');
                return;
            }

            if (!conteudo) {
                showToast('Digite o conteúdo da mensagem', 'danger');
                return;
            }

            mostrarLoading(true);

            try {
                // Primeiro, enviar a mensagem
                const payload = {
                    conteudo: conteudo,
                    materiaId: parseInt(materiaId),
                    tipo: tipo,
                    salaId: tipo === 'COLETIVA' ? parseInt(salaId) : null,
                    alunoId: tipo === 'INDIVIDUAL' ? parseInt(alunoId) : null
                };

                if (dataInicio) payload.dataExibicaoInicio = new Date(dataInicio).toISOString();
                if (dataFim) payload.dataExibicaoFim = new Date(dataFim).toISOString();

                const response = await fetchWithAuth('/api/mensagens', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (!response || !response.ok) {
                    const error = await response.json();
                    throw new Error(error.mensagem || 'Erro ao enviar mensagem');
                }

                const mensagemCriada = await response.json();

                // Se houver anexos, enviá-los separadamente
                if (anexosParaEnviar.length > 0) {
                    await enviarAnexos(mensagemCriada.id, anexosParaEnviar);
                }

                showToast('Mensagem enviada com sucesso!', 'success');
                closeNovaMsgModal();

                // Recarregar mensagens se a thread estiver aberta
                if (document.getElementById('threadPanel').classList.contains('open')) {
                    const materiaIdAtual = document.getElementById('threadTitle').textContent;
                    const materia = materiasDoProfessor.find(m => m.nome === materiaIdAtual);
                    if (materia) {
                        await abrirThreadMateria(materia.id, materia.nome, materia.salaId);
                    }
                }

            } catch (error) {
                console.error('Erro ao enviar mensagem:', error);
                showToast(error.message, 'danger');
            } finally {
                mostrarLoading(false);
            }
        }

        // Enviar anexos para a mensagem
        async function enviarAnexos(mensagemId, anexos) {
            for (const anexo of anexos) {
                try {
                    const payload = {
                        mensagemId: mensagemId,
                        nomeArquivo: anexo.nome,
                        caminhoArquivo: anexo.url,
                        tipoArquivo: anexo.tipo,
                        tamanho: 0 // O Cloudinary já gerencia o tamanho
                    };

                    const response = await fetchWithAuth(`/api/mensagens/${mensagemId}/anexos`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    if (!response || !response.ok) {
                        console.warn(`Erro ao enviar anexo ${anexo.nome}`);
                    }
                } catch (error) {
                    console.error(`Erro ao enviar anexo ${anexo.nome}:`, error);
                }
            }
        }

        // ================================================
        // UTILITÁRIOS
        // ================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg, type = '') {
            const tray = document.getElementById('toastTray');
            if (!tray) return;

            const el = document.createElement('div');
            el.className = 'toast-msg ' + type;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'danger' ? 'fa-exclamation-triangle' : 'fa-info-circle');
            el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
            tray.appendChild(el);

            setTimeout(() => {
                el.style.transition = 'all .3s';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        function mostrarLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function logout() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // ================================================
        // INICIALIZAÇÃO
        // ================================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Verificar token
            const token = await getValidToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // Carregar dados do professor
            await carregarMateriasDoProfessor();

            // Configurar botões
            document.querySelector('.btn-cta')?.addEventListener('click', abrirNovaMsgModal);

            // Configurar navegação
            document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    document.getElementById(`tab-${tab}`)?.classList.add('active');
                    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            // Botão de logout
            document.querySelector('#btn-header-logout')?.addEventListener('click', () => {
                if (confirm('Deseja realmente sair?')) logout();
            });

            // Thread panel close
            document.getElementById('threadOverlay')?.addEventListener('click', () => {
                document.getElementById('threadOverlay').classList.remove('open');
                document.getElementById('threadPanel').classList.remove('open');
            });

            document.getElementById('threadBack')?.addEventListener('click', () => {
                document.getElementById('threadOverlay').classList.remove('open');
                document.getElementById('threadPanel').classList.remove('open');
            });
            console.log('✅ DOM totalmente carregado');
            console.log('📦 muralGrid existe?', document.getElementById('muralGrid'));
            console.log('📦 materiasDoProfessor:', materiasDoProfessor);
        });
    </script>
</body>
