<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a6fc4">
  <title>Inoutchi · Professor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ================================================
       INOUTCHI · PROFESSOR — Dashboard PC/Notebook
       Design: sidebar esquerda + conteúdo principal
    ================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --primary: #1a6fc4;
      --primary-light: #e8f2fc;
      --primary-dark: #0f4f8f;
      --cyan: #0ea5a0;
      --cyan-light: #e6f7f6;
      --grad-main: linear-gradient(135deg, #1a6fc4 0%, #0ea5a0 100%);
      --grad-card: linear-gradient(145deg, #ffffff 0%, #f8fbff 100%);
      --grad-bg: linear-gradient(180deg, #f4f8fd 0%, #eef7f6 60%, #f4f8fd 100%);

      --success: #10b981; --success-bg: #ecfdf5;
      --danger: #ef4444;  --danger-bg: #fef2f2;
      --warning: #f59e0b; --warning-bg: #fffbeb;

      --bg: #f0f5fb;
      --surface: #ffffff;
      --glass: rgba(255,255,255,.78);
      --border: rgba(15,79,143,.10);
      --border-strong: rgba(15,79,143,.18);

      --text: #0b2742;
      --text-secondary: #516583;
      --text-muted: #8395ad;

      --shadow-xs: 0 1px 3px rgba(15,79,143,.07);
      --shadow-sm: 0 4px 14px rgba(15,79,143,.09);
      --shadow-md: 0 10px 30px -8px rgba(15,79,143,.18);
      --shadow-lg: 0 24px 48px -12px rgba(15,79,143,.28);

      --sidebar-w: 240px;
      --topbar-h: 56px;
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== LAYOUT SHELL ===== */
    .app-shell { display: flex; height: 100vh; width: 100%; overflow: hidden; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 40;
      transition: transform .3s cubic-bezier(.2,.9,.2,1);
    }
    .sidebar-brand {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--grad-main);
      display: grid; place-items: center;
      color: #fff; font-weight: 800; font-size: .9rem;
      box-shadow: var(--shadow-sm); flex-shrink: 0;
    }
    .brand-text strong { display: block; font-size: .88rem; font-weight: 800; color: var(--text); }
    .brand-text span   { display: block; font-size: .68rem; color: var(--text-muted); font-weight: 500; }

    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: var(--radius-sm);
      font-size: .84rem; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; transition: all .2s ease;
      margin-bottom: 2px; border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
      position: relative;
    }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-item:hover { background: var(--primary-light); color: var(--primary); }
    .nav-item.active { background: var(--grad-main); color: #fff; box-shadow: var(--shadow-sm); }
    .nav-item .nav-badge {
      margin-left: auto;
      min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px;
      background: rgba(255,255,255,.25); color: #fff;
      font-size: .68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-item:not(.active) .nav-badge {
      background: var(--danger); color: #fff;
    }

    .sidebar-footer {
      padding: 10px; border-top: 1px solid var(--border);
    }
    .sidebar-footer .nav-item { color: var(--danger); }
    .sidebar-footer .nav-item:hover { background: var(--danger-bg); }

    /* mobile sidebar overlay */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 39;
      background: rgba(11,39,66,.4);
      backdrop-filter: blur(4px);
    }
    .sidebar-overlay.open { display: block; }

    /* ===== MAIN AREA ===== */
    .main-area {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ===== TOPBAR ===== */
    .topbar {
      height: var(--topbar-h);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0; z-index: 30;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-left h1 { font-size: 1rem; font-weight: 800; color: var(--text); }
    .topbar-left p  { font-size: .72rem; color: var(--text-muted); font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-secondary); cursor: pointer;
      display: grid; place-items: center;
      transition: all .2s; position: relative;
    }
    .icon-btn svg { width: 16px; height: 16px; }
    .icon-btn:hover { color: var(--primary); border-color: var(--primary-light); box-shadow: var(--shadow-xs); }
    .icon-btn .dot {
      position: absolute; top: 7px; right: 7px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--danger); border: 2px solid #fff;
    }
    #btn-menu { display: none; }

    /* ===== CONTENT ===== */
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; scroll-behavior: smooth; }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

    .tab-pane { display: none; animation: fadeUp .3s ease both; }
    .tab-pane.active { display: block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .content-inner { max-width: 960px; }
    .content-inner.wide { max-width: 1100px; }
    .content-inner.narrow { max-width: 680px; }

    /* ===== CTA BUTTON ===== */
    .btn-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0 18px; height: 38px;
      background: var(--grad-main); color: #fff;
      border: none; border-radius: var(--radius);
      font-weight: 700; font-size: .84rem; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: all .2s;
      font-family: inherit; margin-bottom: 20px;
    }
    .btn-cta:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-cta svg { width: 15px; height: 15px; }

    .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-weight: 700; font-size: .82rem; cursor: pointer; transition: all .2s; border: none; font-family: inherit; }
    .btn-primary { background: var(--grad-main); color: #fff; box-shadow: 0 4px 12px rgba(26,111,196,.25); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,111,196,.35); }
    .btn-secondary { background: #f1f5f9; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e2e8f0; }

    /* ===== MURAL GRID ===== */
    .mural-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .mural-card {
      background: var(--grad-card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent-color, var(--primary));
      border-radius: var(--radius-lg);
      padding: 16px; cursor: pointer;
      transition: all .22s ease;
      text-align: left;
    }
    .mural-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border-strong); border-top-color: var(--accent-color, var(--primary)); }
    .mural-card .icon-wrap {
      width: 42px; height: 42px; border-radius: 12px;
      background: var(--accent-bg, var(--primary-light));
      color: var(--accent-color, var(--primary));
      display: grid; place-items: center; margin-bottom: 10px;
    }
    .mural-card .icon-wrap svg { width: 20px; height: 20px; }
    .mural-card .card-name  { font-size: .9rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .mural-card .card-sala  { font-size: .72rem; color: var(--text-muted); font-weight: 500; margin-top: 2px; }
    .mural-card .card-preview { font-size: .74rem; color: var(--text-secondary); margin-top: 6px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; min-height: 2em; }
    .mural-card .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .card-msgs { font-size: .68rem; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .card-msgs svg { width: 12px; height: 12px; }
    .badge-unread {
      min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px;
      background: var(--danger); color: #fff;
      font-size: .66rem; font-weight: 800;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 8px rgba(239,68,68,.35);
    }

    /* accent classes */
    .cat-mat { --accent-color: #8b5cf6; --accent-bg: #f3efff; }
    .cat-por { --accent-color: #0ea5a0; --accent-bg: #e6f7f6; }
    .cat-his { --accent-color: #ef4444; --accent-bg: #fef2f2; }
    .cat-geo { --accent-color: #f59e0b; --accent-bg: #fffbeb; }
    .cat-cie { --accent-color: #10b981; --accent-bg: #ecfdf5; }
    .cat-art { --accent-color: #ec4899; --accent-bg: #fdf2f8; }
    .cat-edu { --accent-color: #06b6d4; --accent-bg: #ecfeff; }
    .cat-def { --accent-color: #1a6fc4; --accent-bg: #e8f2fc; }

    /* ===== ALUNOS ===== */
    .turma-block { margin-bottom: 22px; }
    .turma-title {
      font-size: .69rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; padding-left: 2px;
    }
    .turma-title svg { width: 13px; height: 13px; }
    .turma-pill {
      background: var(--primary-light); color: var(--primary);
      padding: 2px 8px; border-radius: 6px; font-size: .63rem;
    }
    .alunos-list {
      background: var(--grad-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-xs);
    }
    .aluno-row {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px;
      border-bottom: 1px solid var(--border); transition: background .15s;
    }
    .aluno-row:last-child { border-bottom: none; }
    .aluno-row:hover { background: rgba(26,111,196,.03); }
    .aluno-avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--grad-main); color: #fff;
      display: grid; place-items: center; font-weight: 800; font-size: .9rem;
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .aluno-nome { font-size: .86rem; font-weight: 700; color: var(--text); }
    .aluno-resp { font-size: .7rem; color: var(--text-muted); font-weight: 500; margin-top: 1px; }

    /* ===== CONFIGURAÇÕES ===== */
    .profile-card {
      display: flex; align-items: center; gap: 16px;
      background: var(--grad-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      margin-bottom: 20px; box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .profile-card::before {
      content: ""; position: absolute; inset: 0;
      background: var(--grad-main); opacity: .04;
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--grad-main); color: #fff;
      display: grid; place-items: center; font-weight: 800; font-size: 1.4rem;
      box-shadow: var(--shadow-md); flex-shrink: 0; position: relative; z-index: 1;
    }
    .profile-info { position: relative; z-index: 1; }
    .profile-name  { font-size: 1rem; font-weight: 700; color: var(--text); }
    .profile-email { font-size: .76rem; color: var(--text-secondary); font-weight: 500; margin-top: 2px; }
    .profile-role  {
      display: inline-block; margin-top: 6px;
      font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      color: var(--primary); background: var(--primary-light);
      padding: 2px 8px; border-radius: 5px;
    }

    .config-section-label {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-muted);
      margin-bottom: 8px; padding-left: 2px;
    }
    .config-list {
      background: var(--grad-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow-xs); margin-bottom: 20px;
    }
    .config-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      background: none; border-left: none; border-right: none; border-top: none;
      width: 100%; text-align: left; font-family: inherit;
      transition: background .15s;
    }
    .config-row:last-child { border-bottom: none; }
    .config-row:hover { background: rgba(26,111,196,.03); }
    .config-row .row-icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .config-row .row-icon svg { width: 15px; height: 15px; }
    .config-row .row-label { font-size: .86rem; font-weight: 600; color: var(--text); }
    .config-row .row-desc  { font-size: .7rem; color: var(--text-muted); font-weight: 500; margin-top: 1px; }
    .config-row .row-chev  { margin-left: auto; color: var(--text-muted); }
    .config-row .row-chev svg { width: 14px; height: 14px; }
    .config-row.danger .row-label { color: var(--danger); }
    .config-row.danger:hover { background: var(--danger-bg); }

    /* ===== THREAD PANEL ===== */
    .thread-overlay {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(11,39,66,.4);
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .thread-overlay.open { opacity: 1; pointer-events: auto; }
    .thread-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 100%; max-width: 460px;
      background: var(--bg); z-index: 90;
      transform: translateX(100%);
      transition: transform .32s cubic-bezier(.2,.9,.2,1);
      display: flex; flex-direction: column;
      box-shadow: -20px 0 60px rgba(11,39,66,.2);
    }
    .thread-panel.open { transform: translateX(0); }
    .thread-head {
      height: var(--topbar-h); flex-shrink: 0;
      display: flex; align-items: center; gap: 10px; padding: 0 14px;
      background: rgba(255,255,255,.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .thread-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .thread-icon svg { width: 16px; height: 16px; }
    .thread-head .title strong { display: block; font-size: .88rem; font-weight: 700; color: var(--text); }
    .thread-head .title span   { font-size: .68rem; color: var(--text-muted); font-weight: 500; }
    .thread-body { flex: 1; overflow-y: auto; padding: 16px; }
    .thread-msg {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
      box-shadow: var(--shadow-xs);
    }
    .thread-msg.unread { border-left: 3px solid var(--primary); background: #fafcff; }
    .msg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 5px; }
    .msg-from { font-size: .75rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 5px; }
    .msg-from svg { width: 12px; height: 12px; color: var(--text-muted); }
    .msg-when { font-size: .68rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; }
    .msg-body { font-size: .82rem; color: var(--text-secondary); line-height: 1.5; font-weight: 500; }
    .msg-tag {
      display: inline-block; font-size: .62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 2px 7px; border-radius: 5px; margin-top: 7px; margin-right: 4px;
    }
    .tag-inst { background: var(--primary-light); color: var(--primary); }
    .tag-col  { background: var(--cyan-light); color: var(--cyan); }
    .tag-ind  { background: #f3efff; color: #8b5cf6; }

    /* ===== MODAL NOVA MENSAGEM ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(11,39,66,.5); backdrop-filter: blur(8px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all .25s ease; padding: 16px;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-box {
      background: var(--surface); border-radius: var(--radius-xl);
      width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: popIn .25s ease;
    }
    @keyframes popIn { from { opacity:0; transform:scale(.96) translateY(12px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: var(--grad-main);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    }
    .modal-header h3 { color: #fff; font-size: .95rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .modal-header h3 svg { width: 16px; height: 16px; }
    .modal-close {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
      font-size: 1.1rem; line-height: 1; display: grid; place-items: center;
    }
    .modal-close:hover { background: rgba(255,255,255,.3); }
    .modal-body { padding: 18px 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--border); }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; margin-bottom: 5px; font-weight: 700; font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .form-control, .form-select {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: .86rem; font-family: inherit; background: #fff;
      transition: all .2s; color: var(--text);
    }
    .form-control:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,111,196,.1); }
    textarea.form-control { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ===== EMPTY STATE ===== */
    .empty { text-align: center; padding: 48px 20px; }
    .empty-ic {
      width: 64px; height: 64px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
      display: grid; place-items: center; font-size: 1.5rem;
      margin: 0 auto 14px;
    }
    .empty-ic svg { width: 28px; height: 28px; }
    .empty-t { font-size: .95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .empty-s { font-size: .82rem; color: var(--text-muted); font-weight: 500; }

    /* ===== TOAST ===== */
    .toast-tray {
      position: fixed; top: 68px; right: 20px; z-index: 2000;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast-msg {
      background: rgba(255,255,255,.92); backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      padding: 10px 14px; font-size: .8rem; font-weight: 600; color: var(--text);
      box-shadow: var(--shadow-md); animation: toastIn .3s ease both;
      display: inline-flex; align-items: center; gap: 8px; min-width: 220px;
    }
    .toast-msg svg { width: 15px; height: 15px; flex-shrink: 0; }
    .toast-msg.success { color: var(--success); }
    .toast-msg.danger  { color: var(--danger); }
    @keyframes toastIn { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
        transform: translateX(-100%);
      }
      .sidebar.mobile-open { transform: translateX(0); }
      #btn-menu { display: grid; }
      .topbar-left p { display: none; }
      .content { padding: 16px; }
    }

  el.className = 'toast-msg ' + type;
  const icons = {
    success: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    danger:  '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>',
    '':      '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>',
  };
  el.innerHTML = (icons[type] || icons['']) + esc(msg);
  tray.appendChild(el);
  setTimeout(() => { el.style.transition='all .3s'; el.style.opacity='0'; setTimeout(() => el.remove(), 300); }, 3500);
}

function getMateriaConfig(nome) {
  const up = (nome || '').toUpperCase();
  for (const [k, v] of Object.entries(MATERIAS_CONFIG)) {
    if (up.includes(k)) return v;
  }
  return DEFAULT_CONFIG;
}

// ================================================
//  NAVEGAÇÃO
// ================================================
const TAB_TITLES = {
  mural:  ['Meu Mural',       'Acompanhe as comunicações da escola e envie mensagens às suas turmas.'],
  alunos: ['Meus Alunos',     'Visualize os alunos das suas turmas.'],
  config: ['Configurações',   'Gerencie seu perfil e preferências.'],
};

function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-tab]').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('topbarTitle').textContent = TAB_TITLES[tab][0];
  document.getElementById('topbarSub').textContent   = TAB_TITLES[tab][1];
  closeSidebar();
  if (tab === 'alunos') renderAlunos();
}

function openSidebar()  { document.getElementById('sidebar').classList.add('mobile-open'); document.getElementById('sidebarOverlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
function handleLogout() { showToast('Sessão encerrada. Redirecionando…'); setTimeout(() => { window.location.href = 'login.html'; }, 1500); }

// ================================================
//  RENDER MURAL
// ================================================
function renderMural() {
  const grid = document.getElementById('muralGrid');
  if (!MATERIAS.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-ic">${DEFAULT_CONFIG.iconSvg}</div><div class="empty-t">Nenhuma matéria encontrada</div><div class="empty-s">Você não está vinculado a nenhuma matéria ainda.</div></div>`;
    return;
  }

  let totalNaoLidas = 0;
  grid.innerHTML = MATERIAS.map(mat => {
    const cfg  = getMateriaConfig(mat.nome);
    const msgs = MENSAGENS.filter(m => m.materiaId === mat.id);
    const naoLidas = msgs.filter(m => !m.lida).length;
    totalNaoLidas += naoLidas;
    const preview = msgs.length ? esc(msgs[0].conteudo).slice(0, 80) : 'Sem mensagens recentes';
    return `
      <button class="mural-card ${cfg.cssClass}" onclick="openThread('${mat.id}')">
        <div class="icon-wrap">${cfg.iconSvg}</div>
        <div class="card-name">${esc(mat.nome)}</div>
        <div class="card-sala">${esc(mat.sala_nome)}</div>
        <p class="card-preview">${preview}</p>
        <div class="card-meta">
          <span class="card-msgs">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
            ${msgs.length} msg
          </span>
          ${naoLidas > 0 ? `<span class="badge-unread">${naoLidas}</span>` : ''}
        </div>
      </button>`;
  }).join('');

  // badges sidebar + notif
  const badge = document.getElementById('sidebarMuralBadge');
  badge.textContent = totalNaoLidas > 99 ? '99+' : totalNaoLidas;
  badge.style.display = totalNaoLidas > 0 ? 'flex' : 'none';
  document.getElementById('notifDot').style.display = totalNaoLidas > 0 ? 'block' : 'none';
}

// ================================================
//  THREAD PANEL
// ================================================
function openThread(materiaId) {
  const mat  = MATERIAS.find(m => m.id === materiaId);
  const msgs = MENSAGENS.filter(m => m.materiaId === materiaId);
  const cfg  = getMateriaConfig(mat.nome);

  document.getElementById('threadTitle').textContent = mat.nome;
  document.getElementById('threadSub').textContent   = `${mat.sala_nome} · ${msgs.length} mensagens`;

  const iconEl = document.getElementById('threadIcon');
  iconEl.innerHTML = cfg.iconSvg;
  iconEl.className = `thread-icon ${cfg.cssClass}`;
  iconEl.style.background = 'var(--accent-bg, var(--primary-light))';
  iconEl.querySelector('svg').style.color = 'var(--accent-color, var(--primary))';

  const body = document.getElementById('threadBody');
  if (!msgs.length) {
    body.innerHTML = `<div class="empty"><div class="empty-ic"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 9.75a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375m-13.5 3.01c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 01.778-.332 48.294 48.294 0 005.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z"/></svg></div><div class="empty-t">Nenhuma mensagem</div><div class="empty-s">Ainda não há mensagens para esta matéria.</div></div>`;
  } else {
    body.innerHTML = msgs.map(m => `
      <article class="thread-msg${!m.lida ? ' unread' : ''}">
        <div class="msg-head">
          <span class="msg-from">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            ${esc(m.autor || 'Sistema')}
          </span>
          <span class="msg-when">${fmt(m.data)}</span>
        </div>
        <div class="msg-body">${esc(m.conteudo)}</div>
        <div>
          ${m.alunoNome ? `<span class="msg-tag tag-ind">👤 ${esc(m.alunoNome)}</span>` : ''}
          ${m.tipo === 'COLETIVA'      ? '<span class="msg-tag tag-col">👥 Turma</span>'      : ''}
          ${m.tipo === 'INSTITUCIONAL' ? '<span class="msg-tag tag-inst">🏛️ Diretoria</span>' : ''}
        </div>
      </article>`).join('');
  }

  document.getElementById('threadOverlay').classList.add('open');
  document.getElementById('threadPanel').classList.add('open');
}

function closeThread() {
  document.getElementById('threadOverlay').classList.remove('open');
  document.getElementById('threadPanel').classList.remove('open');
}

// ================================================
//  RENDER ALUNOS
// ================================================
function renderAlunos() {
  const container = document.getElementById('alunosContainer');
  const turmasMap = new Map();
  ALUNOS.forEach(a => {
    if (!turmasMap.has(a.sala_id)) turmasMap.set(a.sala_id, { nome: a.sala_nome, alunos: [] });
    turmasMap.get(a.sala_id).alunos.push(a);
  });

  if (!turmasMap.size) {
    container.innerHTML = `<div class="empty"><div class="empty-ic"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg></div><div class="empty-t">Nenhuma turma</div><div class="empty-s">Você ainda não tem turmas vinculadas.</div></div>`;
    return;
  }

  container.innerHTML = Array.from(turmasMap.values()).map(turma => `
    <div class="turma-block">
      <div class="turma-title">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        ${esc(turma.nome)}
        <span class="turma-pill">${turma.alunos.length} aluno(s)</span>
      </div>
      <div class="alunos-list">
        ${turma.alunos.map(a => `
          <div class="aluno-row">
            <div class="aluno-avatar">${esc((a.nome || '?').charAt(0).toUpperCase())}</div>
            <div>
              <div class="aluno-nome">${esc(a.nome)}</div>
              <div class="aluno-resp">${esc(a.resp || 'Sem responsável vinculado')}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ================================================
//  MODAL NOVA MENSAGEM
// ================================================
function openModal() {
  // preencher selects
  const fMateria = document.getElementById('fMateria');
  fMateria.innerHTML = '<option value="">Selecione uma matéria...</option>' +
    MATERIAS.map(m => `<option value="${m.id}">${esc(m.nome)} · ${esc(m.sala_nome)}</option>`).join('');

  const turmasMap = new Map();
  MATERIAS.forEach(m => { if (!turmasMap.has(m.sala_id)) turmasMap.set(m.sala_id, m.sala_nome); });
  const fTurma = document.getElementById('fTurma');
  fTurma.innerHTML = '<option value="">Selecione uma turma...</option>' +
    Array.from(turmasMap.entries()).map(([id, nome]) => `<option value="${id}">${esc(nome)}</option>`).join('');

  document.getElementById('fAluno').innerHTML = '<option value="">Selecione um aluno...</option>';
  document.getElementById('fConteudo').value = '';
  document.getElementById('fDataInicio').value = '';
  document.getElementById('fDataFim').value = '';
  document.getElementById('fTipo').value = 'COLETIVA';
  document.getElementById('fAlunoGroup').style.display = 'none';

  document.getElementById('novaMsgModal').classList.add('open');
}

function closeModal() { document.getElementById('novaMsgModal').classList.remove('open'); }

function toggleAlunoField() {
  const tipo = document.getElementById('fTipo').value;
  document.getElementById('fAlunoGroup').style.display = tipo === 'INDIVIDUAL' ? 'block' : 'none';
  if (tipo === 'INDIVIDUAL') onTurmaChange();
}

function onTurmaChange() {
  const salaId = document.getElementById('fTurma').value;
  const alunoSel = document.getElementById('fAluno');
  const filtered = salaId ? ALUNOS.filter(a => a.sala_id === salaId) : ALUNOS;
  alunoSel.innerHTML = '<option value="">Selecione um aluno...</option>' +
    filtered.map(a => `<option value="${a.id}">${esc(a.nome)}</option>`).join('');
}

function enviarMensagem() {
  const materiaId = document.getElementById('fMateria').value;
  const conteudo  = document.getElementById('fConteudo').value.trim();
  const tipo      = document.getElementById('fTipo').value;
  const salaId    = document.getElementById('fTurma').value;
  const alunoId   = document.getElementById('fAluno').value;

  if (!materiaId) { showToast('Selecione uma matéria', 'danger'); return; }
  if (!conteudo)  { showToast('Digite o conteúdo da mensagem', 'danger'); return; }

  const aluno = alunoId ? ALUNOS.find(a => a.id === alunoId) : null;
  const nova = {
    id: 'g' + Date.now(),
    materiaId, salaId, tipo, conteudo,
    autor: PROFESSOR.nome,
    lida: false,
    data: new Date().toISOString(),
    alunoNome: aluno ? aluno.nome : undefined,
  };

  MENSAGENS.unshift(nova);
  closeModal();
  renderMural();
  showToast('Mensagem enviada com sucesso!', 'success');
}

// ================================================
//  CONFIGURAÇÕES — preencher nome/email
// ================================================
function renderConfig() {
  document.getElementById('cfgNome').textContent  = PROFESSOR.nome;
  document.getElementById('cfgEmail').textContent = PROFESSOR.email;
  document.getElementById('cfgAvatar').textContent = PROFESSOR.nome.charAt(0).toUpperCase();
}

// ================================================
//  INIT
// ================================================
document.addEventListener('DOMContentLoaded', () => {
  renderConfig();
  renderMural();
});
</script>
