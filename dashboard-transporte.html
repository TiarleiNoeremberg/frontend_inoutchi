<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inoutchi - Painel do Transportador</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1565C0;
            --primary-light: #1E88E5;
            --primary-dark: #0D47A1;
            --cyan: #00ACC1;
            --cyan-light: #26C6DA;
            --cyan-dark: #00838F;
            --success: #10b981;
            --success-dark: #059669;
            --warning: #f59e0b;
            --warning-dark: #d97706;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-hover: rgba(255, 255, 255, 0.10);
            --surface: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #0a0e1a;
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ═══ ANIMATED BACKGROUND ═══ */
        .bg-canvas { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .bg-canvas::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            top: -25%; left: -25%;
            background:
                radial-gradient(ellipse 600px 600px at 20% 30%, rgba(21,101,192,0.35) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 75% 70%, rgba(0,172,193,0.30) 0%, transparent 70%),
                radial-gradient(ellipse 400px 400px at 50% 10%, rgba(30,136,229,0.20) 0%, transparent 60%),
                radial-gradient(ellipse 350px 350px at 80% 20%, rgba(38,198,218,0.15) 0%, transparent 60%);
            animation: meshMove 20s ease-in-out infinite alternate;
        }
        @keyframes meshMove {
            0%   { transform: translate(0,0) rotate(0deg); }
            33%  { transform: translate(30px,-20px) rotate(2deg); }
            66%  { transform: translate(-20px,30px) rotate(-1deg); }
            100% { transform: translate(10px,10px) rotate(1deg); }
        }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: orbFloat 15s ease-in-out infinite; }
        .orb-1 { width: 300px; height: 300px; background: var(--primary); top: 10%; left: 10%; }
        .orb-2 { width: 250px; height: 250px; background: var(--cyan); bottom: 15%; right: 10%; animation-delay: -5s; animation-duration: 18s; }
        .orb-3 { width: 200px; height: 200px; background: linear-gradient(135deg, var(--primary-light), var(--cyan-light)); top: 50%; left: 50%; animation-delay: -10s; animation-duration: 22s; }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            25%     { transform: translate(40px,-30px) scale(1.1); }
            50%     { transform: translate(-20px,50px) scale(0.9); }
            75%     { transform: translate(30px,20px) scale(1.05); }
        }
        .grid-overlay {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridShift 30s linear infinite;
        }
        @keyframes gridShift { 0% { transform: translate(0,0); } 100% { transform: translate(60px,60px); } }
        .particles { position: absolute; inset: 0; }
        .particle { position: absolute; width: 3px; height: 3px; background: rgba(255,255,255,0.3); border-radius: 50%; animation: particleRise linear infinite; }
        .particle:nth-child(1)  { left:5%;  animation-duration:12s; }
        .particle:nth-child(2)  { left:15%; animation-duration:15s; animation-delay:-2s; }
        .particle:nth-child(3)  { left:25%; animation-duration:10s; animation-delay:-4s; }
        .particle:nth-child(4)  { left:35%; animation-duration:18s; animation-delay:-1s; }
        .particle:nth-child(5)  { left:45%; animation-duration:14s; animation-delay:-6s; }
        .particle:nth-child(6)  { left:55%; animation-duration:16s; animation-delay:-3s; }
        .particle:nth-child(7)  { left:65%; animation-duration:11s; animation-delay:-8s; }
        .particle:nth-child(8)  { left:75%; animation-duration:13s; animation-delay:-5s; }
        .particle:nth-child(9)  { left:85%; animation-duration:17s; animation-delay:-7s; }
        .particle:nth-child(10) { left:92%; animation-duration:19s; animation-delay:-9s; }
        @keyframes particleRise {
            0%   { bottom:-5%; opacity:0; transform:scale(0.5); }
            10%  { opacity:1; }
            90%  { opacity:1; }
            100% { bottom:105%; opacity:0; transform:scale(1.5); }
        }

        /* ═══ LAYOUT ═══ */
        .app-wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

        /* ═══ HEADER ═══ */
        header {
            backdrop-filter: blur(20px);
            background: var(--glass);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; }
        .header-logo { height: 32px; width: auto; filter: brightness(1.1) drop-shadow(0 2px 8px rgba(0,172,193,0.3)); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        #logout-button {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
            display: flex; align-items: center; gap: 6px;
        }
        #logout-button:hover { background: rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.5); }

        /* ═══ MAIN CONTENT ═══ */
        .main-content { flex: 1; display: flex; justify-content: center; padding: 24px 16px; }

        .students-container {
            width: 100%;
            max-width: 860px;
            backdrop-filter: blur(20px);
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeSlideUp 0.6s ease-out;
        }
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .container-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .container-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e2e8f0, var(--cyan-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .container-header .icon-bus {
            width: 22px; height: 22px;
            color: var(--cyan-light);
        }

        /* ═══ ACTION BUTTONS ═══ */
        .actions-bar {
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
        }
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
        .btn-entry {
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3);
        }
        .btn-entry:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
        .btn-exit {
            background: linear-gradient(135deg, var(--warning), var(--warning-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }
        .btn-exit:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.4); }

        /* ═══ TABLE ═══ */
        .table-wrapper { overflow-x: auto; }
        .student-table { width: 100%; border-collapse: collapse; }
        .student-table th {
            padding: 12px 20px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border);
            white-space: nowrap;
        }
        .student-table td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .student-table tbody tr { transition: background 0.2s; }
        .student-table tbody tr:hover { background: var(--glass-hover); }

        /* ═══ CHECKBOXES ═══ */
        .custom-checkbox {
            width: 18px; height: 18px;
            accent-color: var(--cyan);
            cursor: pointer;
            border-radius: 4px;
        }

        /* ═══ STATUS BADGES ═══ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .status-absent {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.25);
        }
        .status-present {
            background: rgba(16,185,129,0.15);
            color: #6ee7b7;
            border: 1px solid rgba(16,185,129,0.25);
        }
        .status-pending {
            background: rgba(245,158,11,0.15);
            color: #fcd34d;
            border: 1px solid rgba(245,158,11,0.25);
        }

        /* ═══ CONFIRM BUTTON IN TABLE ═══ */
        .btn-confirm-receipt, .confirmar-saida-btn {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--success), var(--success-dark));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-confirm-receipt:hover, .confirmar-saida-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(16,185,129,0.4); }
        .btn-confirm-receipt:disabled, .confirmar-saida-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .text-center { text-align: center; }

        /* ═══ MODALS ═══ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(10,14,26,0.98));
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 28px;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.95) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-content h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #e2e8f0, var(--cyan-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .modal-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary, .btn-outline-secondary {
            background: var(--glass);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover, .btn-outline-secondary:hover { background: var(--glass-hover); color: var(--text); }
        .btn-success, .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--cyan-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(21,101,192,0.3);
        }
        .btn-success:hover, .btn-primary:hover { box-shadow: 0 6px 20px rgba(21,101,192,0.4); transform: translateY(-1px); }
        .btn-success:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-light-blue {
            background: linear-gradient(135deg, var(--primary-light), var(--cyan));
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-light-blue:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(30,136,229,0.4); }

        .location-status {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 10px 0;
        }
        .location-success-message {
            color: var(--success) !important;
            font-size: 0.85rem;
        }
        .coordinates-display {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 6px;
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 640px) {
            header { padding: 12px 16px; }
            .main-content { padding: 16px 10px; }
            .students-container { border-radius: 12px; }
            .container-header { padding: 16px 18px; }
            .actions-bar { padding: 14px 18px; flex-wrap: wrap; }
            .btn { font-size: 0.85rem; padding: 10px 16px; }
            .student-table th, .student-table td { padding: 10px 12px; font-size: 0.82rem; }
        }
    </style>
</head>

<body>

    <!-- ═══ ANIMATED BACKGROUND ═══ -->
    <div class="bg-canvas">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
        <div class="particles">
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <div class="app-wrapper">

        <!-- ═══ HEADER ═══ -->
        <header>
            <div class="header-left">
                <img src="assets/images/LogoInoutchi_linha.png" class="header-logo" alt="Logotipo Inoutchi" />
            </div>
            <div class="header-right">
                <button id="logout-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sair
                </button>
            </div>
        </header>

        <!-- ═══ MAIN CONTENT ═══ -->
        <div class="main-content">
            <div class="students-container">
                <div class="container-header">
                    <svg class="icon-bus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3s.5-1.7.8-2.8c.1-.4.2-.8.2-1.2 0-.4-.1-.8-.2-1.2l-1.4-5C20.1 6.8 19.1 6 18 6H4a2 2 0 0 0-2 2v10h3"/><circle cx="7" cy="18" r="2"/><path d="M9 18h5"/><circle cx="16" cy="18" r="2"/></svg>
                    <h2>Meus Alunos</h2>
                </div>
                <div class="actions-bar">
                    <button class="btn btn-entry" id="btn-registrar-entrada" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        Registrar Entrada
                    </button>
                    <button class="btn btn-exit" id="btn-solicitar-saida" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Solicitar Saída
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="student-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selecionar-todos" class="custom-checkbox"></th>
                                <th>Aluno</th>
                                <th>Status</th>
                                <th class="text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- ═══ MODAL DE CONFIRMAÇÃO ═══ -->
    <div class="modal-overlay" id="confirmationModal">
        <div class="modal-content">
            <h3 id="modalTitle">Confirmar Ação</h3>
            <p id="modalMessage">Você confirma esta ação para 1 aluno(s)?</p>
            <div id="locationStatus" class="location-status" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite; display:inline-block; vertical-align:middle;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                Obtendo sua localização...
            </div>
            <div style="display: flex; justify-content: center; margin: 12px 0;">
                <button class="btn-light-blue" id="getLocationBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Atualizar Localização
                </button>
            </div>
            <div id="locationSuccessMessage" style="display: none; text-align: center; margin-bottom: 10px; color: var(--success);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block; vertical-align:middle;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Localização Obtida com Sucesso!
            </div>
            <div id="coordinatesDisplay" class="coordinates-display" style="display: none; text-align: center;">
                <div>Lat: <span id="displayLatitude">-</span></div>
                <div>Lon: <span id="displayLongitude">-</span></div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-secondary" id="cancelAction">Cancelar</button>
                <button class="modal-btn btn-success" id="confirmAction" disabled>Confirmar</button>
            </div>
        </div>
    </div>

    <!-- ═══ MODAL DE FEEDBACK ═══ -->
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-content">
            <h3 id="feedbackTitle"></h3>
            <p id="feedbackMessage"></p>
            <div class="modal-actions" style="justify-content: center;">
                <button class="modal-btn btn-primary" id="closeFeedback">OK</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const BACKEND_URL = 'https://inoutchi-backend.onrender.com';
        document.addEventListener('DOMContentLoaded', () => {
            const btnRegistrarEntrada = document.getElementById('btn-registrar-entrada');
            const btnSolicitarSaida = document.getElementById('btn-solicitar-saida');
            const selecionarTodosCheckbox = document.getElementById('selecionar-todos');
            const studentListBody = document.getElementById('student-list-body');
            const cancelActionBtn = document.getElementById('cancelAction');
            const confirmActionBtn = document.getElementById('confirmAction');
            const closeFeedbackBtn = document.getElementById('closeFeedback');

            let currentUser = null;
            let studentsData = [];
            let currentAction = null;
            let currentActionPayload = null;
            let studentRefreshInterval = null;

            async function renovarToken() {
                const refreshToken = localStorage.getItem('refresh_token');
                if (!refreshToken) { window.location.href = 'login.html'; return null; }
                const clientId = 'myclientid'; const clientSecret = 'myclientsecret';
                const body = new URLSearchParams();
                body.append('grant_type', 'refresh_token'); body.append('refresh_token', refreshToken);
                try {
                    const response = await fetch(`${BACKEND_URL}/oauth2/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret) },
                        body: body
                    });
                    if (!response.ok) throw new Error('Falha ao renovar token');
                    const tokenData = await response.json();
                    localStorage.setItem('access_token', tokenData.access_token);
                    if (tokenData.refresh_token) localStorage.setItem('refresh_token', tokenData.refresh_token);
                    return tokenData.access_token;
                } catch (error) {
                    localStorage.clear(); window.location.href = 'login.html'; return null;
                }
            }

            async function fetchWithAuth(endpoint, options = {}) {
                let accessToken = localStorage.getItem('access_token');
                if (!accessToken) { accessToken = await renovarToken(); if (!accessToken) throw new Error("Não foi possível obter um token."); }
                const doFetch = async (token) => fetch(BACKEND_URL + endpoint, { ...options, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers } });
                let response = await doFetch(accessToken);
                if (response.status === 401) {
                    const newAccessToken = await renovarToken();
                    if (newAccessToken) response = await doFetch(newAccessToken);
                }
                if (!response.ok) { const errorData = await response.json().catch(() => ({})); throw new Error(errorData.message || errorData.erro || `Erro ${response.status}`); }
                return response;
            }

            async function initializeApp() {
                try {
                    await loadStudents();
                    setupEventListeners();
                    startAutoRefresh();
                } catch (error) {
                    console.error('Erro na inicialização:', error);
                    showFeedback('Erro Crítico', 'Não foi possível carregar os dados. Por favor, tente fazer login novamente.');
                }
            }

            async function loadStudents() {
                studentListBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-muted);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px;"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    Carregando...</td></tr>`;
                try {
                    const response = await fetchWithAuth('/api/transporte/meus-alunos');
                    const responseData = await response.json();
                    studentsData = responseData.data || responseData;
                    renderStudents();
                } catch (err) {
                    console.error('Erro ao carregar estudantes:', err);
                    studentListBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--danger); padding:20px;"><b>Falha ao carregar alunos:</b> ${err.message}</td></tr>`;
                }
            }

            function renderStudents() {
                studentsData.sort((a, b) => a.nome.toLowerCase().localeCompare(b.nome.toLowerCase()));
                studentListBody.innerHTML = '';
                if (studentsData.length === 0) {
                    studentListBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:24px; color:var(--text-muted);">Nenhum aluno associado a você.</td></tr>`;
                    disableAllActions();
                    return;
                }
                studentsData.forEach(aluno => {
                    const tr = document.createElement('tr');
                    tr.dataset.status = aluno.saidaPendente ? 'AGUARDANDO_CONFIRMACAO' : aluno.status;
                    let statusText, statusClass, checkboxDisabled = false;
                    let actionCell = '<td></td>';
                    if (aluno.saidaPendente) {
                        statusText = 'Saída Pendente';
                        statusClass = 'status-pending';
                        checkboxDisabled = true;
                        actionCell = `<td class="text-center"><button class="confirmar-saida-btn" data-aluno-id="${aluno.id}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                            Confirmar</button></td>`;
                    } else if (aluno.status === 'PRESENTE') {
                        statusText = 'Presente';
                        statusClass = 'status-present';
                    } else {
                        statusText = 'Ausente';
                        statusClass = 'status-absent';
                    }
                    tr.innerHTML = `
                    <td><input type="checkbox" class="custom-checkbox student-checkbox" value="${aluno.id}" ${checkboxDisabled ? 'disabled' : ''}></td>
                    <td>${aluno.nome}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    ${actionCell}`;
                    studentListBody.appendChild(tr);
                });
                updateActionButtonsState();
            }

            function getSelectedStudentIds() {
                return Array.from(document.querySelectorAll('.student-checkbox:checked')).map(cb => cb.value);
            }

            function updateActionButtonsState() {
                const selectedCheckboxes = Array.from(document.querySelectorAll('.student-checkbox:checked'));
                const anySelected = selectedCheckboxes.length > 0;
                if (!anySelected) { btnRegistrarEntrada.disabled = true; btnSolicitarSaida.disabled = true; return; }
                const selectedStatuses = selectedCheckboxes.map(cb => cb.closest('tr').dataset.status);
                btnRegistrarEntrada.disabled = !selectedStatuses.every(s => s === 'AUSENTE');
                btnSolicitarSaida.disabled = !selectedStatuses.every(s => s === 'PRESENTE');
            }

            function disableAllActions() {
                if (btnRegistrarEntrada) btnRegistrarEntrada.disabled = true;
                if (btnSolicitarSaida) btnSolicitarSaida.disabled = true;
                if (selecionarTodosCheckbox) selecionarTodosCheckbox.disabled = true;
            }

            function setupEventListeners() {
                if (selecionarTodosCheckbox) selecionarTodosCheckbox.addEventListener('change', handleSelectAll);
                if (studentListBody) {
                    studentListBody.addEventListener('change', handleStudentSelection);
                    studentListBody.addEventListener('click', handleActionClick);
                }
                if (btnRegistrarEntrada) btnRegistrarEntrada.addEventListener('click', () => preareBatchAction('entrada'));
                if (btnSolicitarSaida) btnSolicitarSaida.addEventListener('click', () => preareBatchAction('saida'));
                const logoutButton = document.getElementById('logout-button');
                if (logoutButton) logoutButton.addEventListener('click', logout);
                if (cancelActionBtn) cancelActionBtn.addEventListener('click', closeConfirmationModal);
                if (confirmActionBtn) confirmActionBtn.addEventListener('click', executeBatchAction);
                if (closeFeedbackBtn) closeFeedbackBtn.addEventListener('click', closeFeedbackModal);
                const getLocationBtn = document.getElementById('getLocationBtn');
                if (getLocationBtn) getLocationBtn.addEventListener('click', openConfirmationModal);
            }

            function handleSelectAll(event) {
                const isChecked = event.target.checked;
                document.querySelectorAll('.student-checkbox:not(:disabled)').forEach(cb => { cb.checked = isChecked; });
                updateActionButtonsState();
            }

            function handleStudentSelection() {
                const allCheckboxes = document.querySelectorAll('.student-checkbox:not(:disabled)');
                const checkedCount = document.querySelectorAll('.student-checkbox:checked').length;
                if (selecionarTodosCheckbox) selecionarTodosCheckbox.checked = allCheckboxes.length > 0 && checkedCount === allCheckboxes.length;
                updateActionButtonsState();
            }

            function preareBatchAction(action) {
                currentAction = action;
                const studentIds = getSelectedStudentIds();
                if (studentIds.length === 0) { showFeedback('Nenhum Aluno', 'Por favor, selecione pelo menos um aluno.'); return; }
                if (action === 'entrada' && btnRegistrarEntrada.disabled) { showFeedback('Ação Inválida', 'Apenas alunos com status "Ausente" podem ser selecionados para registrar entrada.'); return; }
                if (action === 'saida' && btnSolicitarSaida.disabled) { showFeedback('Ação Inválida', 'Apenas alunos com status "Presente" podem ser selecionados para solicitar saída.'); return; }
                currentActionPayload = { alunoIds: studentIds };
                openConfirmationModal();
            }

            async function executeBatchAction() {
                if (!currentAction || !currentActionPayload) return;
                const endpoint = currentAction === 'entrada' ? '/api/transporte/chamadas/entrada' : '/api/transporte/chamadas/saida';
                const payload = {
                    alunoIds: currentActionPayload.alunoIds.map(id => Number(id)),
                    latitude: currentActionPayload.location.latitude,
                    longitude: currentActionPayload.location.longitude
                };
                try {
                    const response = await fetchWithAuth(endpoint, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await response.json();
                    closeConfirmationModal();
                    showFeedback('Sucesso!', `Ação de ${currentAction} processada com sucesso!`);
                    await loadStudents();
                } catch (error) {
                    console.error(`Erro ao executar ${currentAction}:`, error);
                    closeConfirmationModal();
                    showFeedback('Erro na Ação', error.message);
                } finally {
                    currentAction = null; currentActionPayload = null;
                }
            }

            function openConfirmationModal() {
                const confirmationModal = document.getElementById('confirmationModal');
                if (confirmationModal) confirmationModal.style.display = 'flex';
                confirmActionBtn.disabled = true;
                getLocation().then(location => {
                    currentActionPayload.location = { latitude: location.coords.latitude, longitude: location.coords.longitude };
                    document.getElementById('displayLatitude').textContent = location.coords.latitude.toFixed(6);
                    document.getElementById('displayLongitude').textContent = location.coords.longitude.toFixed(6);
                    document.getElementById('locationSuccessMessage').style.display = 'block';
                    confirmActionBtn.disabled = false;
                }).catch(error => {
                    document.getElementById('locationStatus').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline-block;vertical-align:middle;margin-right:4px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> ${error.message}`;
                    document.getElementById('locationStatus').style.display = 'block';
                });
            }

            function closeConfirmationModal() {
                const confirmationModal = document.getElementById('confirmationModal');
                if (confirmationModal) confirmationModal.style.display = 'none';
            }

            function showFeedback(title, message) {
                const feedbackModal = document.getElementById('feedbackModal');
                document.getElementById('feedbackTitle').textContent = title;
                document.getElementById('feedbackMessage').textContent = message;
                if (feedbackModal) feedbackModal.style.display = 'flex';
            }

            function closeFeedbackModal() {
                const feedbackModal = document.getElementById('feedbackModal');
                if (feedbackModal) feedbackModal.style.display = 'none';
            }

            function getLocation() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) { reject(new Error("Geolocalização não é suportada.")); return; }
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
                });
            }

            function logout() {
                if (confirm("Você tem certeza que deseja sair do sistema?")) {
                    stopAutoRefresh(); localStorage.clear(); window.location.href = 'index.html';
                }
            }

            function startAutoRefresh() { stopAutoRefresh(); studentRefreshInterval = setInterval(loadStudents, 30000); }
            function stopAutoRefresh() { if (studentRefreshInterval) clearInterval(studentRefreshInterval); }

            async function handleActionClick(event) {
                const button = event.target.closest('.confirmar-saida-btn');
                if (!button) return;
                const alunoId = button.dataset.alunoId;
                const aluno = studentsData.find(s => s.id == alunoId);
                if (!aluno) return;
                if (confirm(`Você confirma a retirada do aluno(a) ${aluno.nome}?`)) {
                    showFeedback('Processando...', `Confirmando a saída de ${aluno.nome}...`);
                    try {
                        const payload = { alunoId: Number(alunoId) };
                        const response = await fetchWithAuth('/api/transporte/confirmar-saida', { method: 'POST', body: JSON.stringify(payload) });
                        const result = await response.json();
                        showFeedback('Sucesso!', result.mensagem || `Saída de ${aluno.nome} confirmada.`);
                        await loadStudents();
                    } catch (error) {
                        showFeedback('Erro na Confirmação', error.message);
                    }
                }
            }

            initializeApp();
        });
    </script>
</body>
