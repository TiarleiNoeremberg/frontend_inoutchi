<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>DIAGNÓSTICO INOUTCHI</title>
    <style>
        /*
        ================================================================
        == CÓDIGO DE DIAGNÓSTICO - TUDO FOI SIMPLIFICADO AO MÁXIMO ==
        ================================================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #00008b; /* Fundo azul escuro para ter certeza que não é uma tela branca */
            color: white;
            position: relative; 
        }

        /* O HEADER - Simplificado */
        .header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 80px;
            background-color: #ff4500; /* Laranja forte para ser visível */
            z-index: 10;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            font-size: 2rem;
            font-weight: bold;
        }

        /* O CONTAINER - Simplificado */
        .container {
            position: absolute;
            top: 80px; bottom: 0; left: 0; right: 0;
            padding: 1.5rem;
            background-color: #333; /* Cinza escuro para diferenciar */
            display: flex;
        }

        /* A GRADE - Simplificada */
        .alunos-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1rem;
        }
        
        /* O CARD - Simplificado ao extremo, sem animações ou transições */
        .aluno-card {
            background-color: #adff2f; /* Verde-limão para ser gritante */
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    <div class="header">
        <span>CABEÇALHO DE TESTE</span>
    </div>

    <div class="container">
        <div class="alunos-grid" id="alunosGrid">
            <!-- Gerando 30 cards estáticos para o teste -->
        </div>
    </div>
    
    <!-- 
    ============================================================
    == TODO O JAVASCRIPT ESTÁ DESATIVADO PARA ESTE TESTE INICIAL ==
    ============================================================
    -->
    <script>
        // Adiciona 30 cards de teste para garantir que a grade está sendo preenchida
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('alunosGrid');
            if (grid) {
                for (let i = 1; i <= 30; i++) {
                    const card = document.createElement('div');
                    card.className = 'aluno-card';
                    card.innerText = `CARD ${i}`;
                    grid.appendChild(card);
                }
            }
        });
    </script>
</body>
</html>
