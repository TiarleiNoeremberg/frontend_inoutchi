<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>DIAGNÓSTICO FINAL</title>
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #f0f8ff; /* Fundo azul bem claro (aliceblue) */
        }
        
        /* A TABELA QUE VAI CONTROLAR O LAYOUT INTEIRO */
        .layout-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse; /* Remove qualquer espaço entre as células */
        }
        
        /* A LINHA DO HEADER: ALTURA FIXA */
        .header-row {
            height: 80px;
        }
        
        /* A LINHA DO CONTEÚDO: VAI OCUPAR O RESTO */
        .content-row {
            height: auto; /* O padrão, vai se esticar */
        }
        
        /* As células da tabela não devem ter padding */
        .layout-table td {
            padding: 0;
            vertical-align: top; /* Garante que o conteúdo comece do topo */
        }

        /* HEADER: Agora é um DIV simples, sem position */
        .header {
            width: 100%;
            height: 100%; /* Ocupa 100% da célula da tabela */
            background-color: #ff4500; /* Laranja forte */
            color: white;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            font-size: 2rem;
            font-weight: bold;
        }

        /* CONTAINER: Agora é um DIV que ocupa 100% da sua célula */
        .container {
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            background-color: #333; /* Cinza escuro */
            display: flex; /* Flex para organizar a grade dentro dele */
        }

        /* A GRADE: Ocupa 100% do container */
        .alunos-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1rem;
        }
        
        /* O CARD */
        .aluno-card {
            background-color: #adff2f; /* Verde-limão */
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>
    
    <!-- Estrutura de Tabela para o Layout -->
    <table class="layout-table">
        <tr class="header-row">
            <td>
                <div class="header">CABEÇALHO</div>
            </td>
        </tr>
        <tr class="content-row">
            <td>
                <div class="container">
                    <div class="alunos-grid" id="alunosGrid">
                        <!-- Cards serão inseridos aqui -->
                    </div>
                </div>
            </td>
        </tr>
    </table>

    <script>
        // Mesmo script de antes para popular a grade
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('alunosGrid');
            if (grid) {
                for (let i = 1; i <= 30; i++) {
                    const card = document.createElement('div');
                    card.className = 'aluno-card';
                    card.innerText = `CARD ${i}`;
                    grid.appendChild(card);
                }
            }
        });
    </script>

</body>
</html>
