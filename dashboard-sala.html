<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Inoutchi - Dashboard Sala</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
}

body {
    font-family: 'Nunito', Tahoma, Geneva, Verdana, sans-serif;
    /* Soft, friendly background */
    background: #f0f4f8;
    background-image: radial-gradient(circle at top left, #ffe6e6, transparent 50%),
                      radial-gradient(circle at bottom right, #e6f7ff, transparent 50%);
    color: #2d3748;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* HEADER OTIMIZADO */
.header {
    background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
    color: #4A5568;
    padding: 0 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
    height: 10vh;
    min-height: 60px;
    max-height: 90px;
    flex-shrink: 0;
    z-index: 10;
    border-bottom: 3px solid rgba(255, 255, 255, 0.7);
}

.container {
    height: 90vh;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.alunos-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr) !important;
    grid-template-rows: repeat(6, 1fr) !important;
    gap: 1.2rem;
    width: 100%;
    height: 100%;
    flex: 1;
    overflow: hidden !important;
}

.aluno-card {
    background: #ffffff;
    border: 3px solid #edf2f7;
    border-radius: 24px;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.04);
    cursor: default;
    user-select: none;
    position: relative;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

.aluno-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: #edf2f7;
    transition: all 0.3s ease;
}

.aluno-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

.aluno-nome {
    font-size: clamp(1rem, 2.5vh, 1.8rem);
    font-weight: 800;
    margin-bottom: 0.3rem;
    line-height: 1.1;
    word-break: break-word;
    max-width: 100%;
    color: #2D3748;
}

.aluno-horario {
    font-size: clamp(0.7rem, 1.8vh, 1.2rem);
    color: #718096;
    font-weight: 700;
    background: #f1f5f9;
    padding: 4px 12px;
    border-radius: 12px;
    display: inline-block;
}

.sala-info h1 {
    font-size: clamp(1.2rem, 3vh, 2.2rem);
    font-weight: 900;
    margin: 0;
    color: #2D3748;
    text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sala-info {
    flex: 1;
}

.user-info {
    display: flex;
    align-items: center;
    gap: 1.2rem;
}

.logout-btn {
    background-color: #FF6B6B;
    border: none;
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-weight: 800;
    font-size: clamp(0.8rem, 2.5vh, 1rem);
    white-space: nowrap;
    box-shadow: 0 4px 6px rgba(255, 107, 107, 0.3);
}

.logout-btn:hover {
    background-color: #ff5252;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
}

.status-info {
    display: flex;
    gap: 1rem;
    font-size: clamp(0.9rem, 2.5vh, 1.1rem);
    background: rgba(255, 255, 255, 0.7);
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 2px solid white;
    white-space: nowrap;
    color: #4A5568;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.status-item.hora {
    min-width: 100px;
    justify-content: center;
}

.status-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
}

/* THEMES FOR CARDS */
.aluno-card.tutor {
    background: #ecfdf5;
    border-color: #34d399;
}
.aluno-card.tutor::before { background: #34d399; }
.aluno-card.tutor .aluno-horario { color: #047857; background: #d1fae5; }
.aluno-card.tutor .aluno-nome { color: #065f46; }

.aluno-card.token {
    background: #fffbeb;
    border-color: #fbbf24;
}
.aluno-card.token::before { background: #fbbf24; }
.aluno-card.token .aluno-horario { color: #b45309; background: #fef3c7; }
.aluno-card.token .aluno-nome { color: #92400e; }

.aluno-card.diretor {
    background: #fef2f2;
    border-color: #f87171;
}
.aluno-card.diretor::before { background: #f87171; }
.aluno-card.diretor .aluno-horario { color: #dc2626; background: #fee2e2; }
.aluno-card.diretor .aluno-nome { color: #b91c1c; }

.aluno-card.transporte {
    background: #eef2ff;
    border-color: #818cf8;
}
.aluno-card.transporte::before { background: #818cf8; }
.aluno-card.transporte .aluno-horario { color: #4338ca; background: #e0e7ff; }
.aluno-card.transporte .aluno-nome { color: #3730a3; }

/* ANIMATIONS */
@keyframes pulse-tutor { 0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(52, 211, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); } }
@keyframes pulse-diretor { 0% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(248, 113, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(248, 113, 113, 0); } }
@keyframes pulse-token { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }
@keyframes pulse-sistema { 0% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(96, 165, 250, 0); } 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0); } }
@keyframes pulse-transporte { 0% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(129, 140, 248, 0); } 100% { box-shadow: 0 0 0 0 rgba(129, 140, 248, 0); } }

.aluno-card.destaque {
    transform: scale(1.1);
    z-index: 100;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
}

.aluno-card.destaque .aluno-nome {
    font-size: 1.1rem;
}

.aluno-card.destaque .aluno-horario {
    font-size: 0.8rem;
}

.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 1.5rem;
    color: #4A5568;
    font-weight: 800;
    grid-column: 1 / -1;
}

.empty-state {
    text-align: center;
    color: #A0AEC0;
    padding: 3rem;
    font-size: 1.5rem;
    font-weight: 800;
    grid-column: 1 / -1;
    background: rgba(255,255,255,0.5);
    border-radius: 24px;
    border: 3px dashed #CBD5E0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-state {
    text-align: center;
    color: #E53E3E;
    padding: 2rem;
    background: #FFF5F5;
    border-radius: 20px;
    border: 2px solid #FC8181;
    margin: 1rem;
    grid-column: 1 / -1;
    font-weight: 800;
    font-size: 1.2rem;
}

.notification-toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 1.2rem 2rem;
    border-radius: 50px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    z-index: 1001;
    display: flex;
    align-items: center;
    gap: 1rem;
    max-width: 90%;
    animation: slideInBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 3px solid;
}

.notification-toast.success { border-color: #48BB78; }
.notification-toast.error { border-color: #F56565; }
.notification-toast.warning { border-color: #ED8936; }
.notification-toast.info { border-color: #4299E1; }

.notification-icon { font-size: 1.5rem; }
.notification-content { flex: 1; }
.notification-title { font-weight: 800; margin-bottom: 0.2rem; color: #2D3748; }
.notification-message { font-size: 0.95rem; color: #718096; font-weight: 600; }

@keyframes slideInBounce {
    0% { opacity: 0; transform: translateX(-50%) translateY(-40px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.aluno-card.pendente {
    transition: all 0.3s ease-in-out !important;
    position: relative;
    z-index: 100;
}

.aluno-card.pendente .aluno-horario {
    font-weight: 800 !important;
}

.aluno-card.confirmado {
    background: #ecfdf5 !important;
    border-color: #10b981 !important;
    transition: all 0.5s ease;
}
.aluno-card.confirmado::before { background: #10b981 !important; }
.aluno-card.confirmado .aluno-horario { color: #047857 !important; background: #d1fae5 !important; }
.aluno-card.confirmado .aluno-nome { color: #065f46 !important; }

.expansion-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    z-index: 999;
    display: none;
}

.expansion-overlay.active { display: block; }

.aluno-card.expandido {
    transform: scale(1.6) !important;
    z-index: 1000 !important;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25) !important;
    width: 250px !important;
    height: 180px !important;
}

.aluno-card.expandido .aluno-nome {
    font-size: 2.2rem !important;
    font-weight: 900 !important;
}

.aluno-card.expandindo {
    z-index: 1000 !important;
    transition: all 3s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3) !important;
    position: relative !important;
}

.aluno-card.expandindo .aluno-nome {
    font-size: 1.1rem !important;
}

.aluno-card.expandindo .aluno-horario {
    font-size: 0.8rem !important;
}

.aluno-card .btn-confirmar-recebimento {
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 800;
    background-color: #22c55e;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(34, 197, 94, 0.3);
}

.aluno-card .btn-confirmar-recebimento:hover {
    background-color: #16a34a;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(34, 197, 94, 0.4);
}

.card.transporte {
    border-left: 5px solid var(--primary-color);
    background-color: #f0f4f8;
}

.aluno-card.recolhendo {
    transform: scale(1) !important;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.04) !important;
}

@keyframes tremor-effect {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    10% { transform: translate(-1px, -2px) rotate(-1deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    30% { transform: translate(3px, 2px) rotate(0deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    50% { transform: translate(-1px, 2px) rotate(-1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    70% { transform: translate(3px, 1px) rotate(-1deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    90% { transform: translate(1px, 2px) rotate(0deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
}

.aluno-card.entrada-tremor {
    animation: tremor-effect 0.5s infinite;
    border-color: #60a5fa !important;
    box-shadow: 0 0 25px rgba(96, 165, 250, 0.6) !important;
    z-index: 10;
}
.aluno-card.entrada-tremor::before { background: #60a5fa !important; }

.aluno-card.removendo {
    transform: scale(0.5) translateY(50px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.55, 0.085, 0.68, 0.53);
}

@media screen and (min-width: 1280px) {
    .alunos-grid {
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(6, minmax(130px, 1fr));
    }
}

@media screen and (max-width: 480px) {
    .header { padding: 0 0.8rem; }
    .sala-info h1 { font-size: 1.2rem !important; }
    .status-info { font-size: 0.8rem !important; padding: 0.4rem 0.8rem !important; gap: 0.5rem !important; }
    .logout-btn { padding: 0.4rem 0.8rem !important; font-size: 0.8rem !important; }
    .aluno-nome { font-size: clamp(0.9rem, 2vh, 1.3rem); }
    .aluno-horario { font-size: clamp(0.6rem, 1.5vh, 1rem); }
}

@media screen and (max-width: 768px) {
    .alunos-grid {
        grid-template-columns: repeat(3, 1fr) !important;
        grid-template-rows: repeat(12, minmax(100px, 1fr)) !important;
        gap: 0.8rem;
    }
    .aluno-nome { font-size: clamp(0.9rem, 3.5vw, 1.3rem); }
    .aluno-horario { font-size: clamp(0.7rem, 2.8vw, 1rem); }
    .header { padding: 0.5rem 1rem; height: 75px; }
    .status-info { min-width: auto; padding: 0.5rem 1rem; font-size: 0.9rem; }
    .logout-btn { padding: 0.5rem 1rem; }
}

@media screen and (orientation: landscape) {
    .alunos-grid {
        grid-template-columns: repeat(6, 1fr) !important;
        grid-template-rows: repeat(6, 1fr) !important;
        gap: 1rem;
    }
}

@media screen and (orientation: portrait) {
    .alunos-grid {
        grid-template-columns: repeat(3, 1fr) !important;
        grid-template-rows: repeat(12, 1fr) !important;
        gap: 0.8rem;
    }
    .aluno-nome { font-size: clamp(0.9rem, 2vh, 1.3rem); }
}

.fullscreen-btn {
    display: none;
    background-color: white;
    color: #4A5568;
    border: none;
    border-radius: 20px;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    font-weight: 800;
    font-size: clamp(0.8rem, 2.5vh, 1rem);
    margin-right: 0.5rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.fullscreen-btn:hover {
    background-color: #f8fafc;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

/* OVERLAY ESTILO FAMÍLIA */
#startOverlay {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.6) !important;
}

#startButton {
    background: linear-gradient(135deg, #48bb78 0%, #38a169 100%) !important;
    padding: 25px 60px !important;
    font-size: 2.2rem !important;
    font-family: 'Nunito', sans-serif !important;
    font-weight: 900 !important;
    border-radius: 50px !important;
    box-shadow: 0 10px 30px rgba(56, 161, 105, 0.4), inset 0 -4px 0 rgba(0,0,0,0.1) !important;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    border: 4px solid white !important;
    color: white !important;
    text-shadow: 1px 2px 4px rgba(0,0,0,0.2) !important;
}

#startButton:hover {
    transform: scale(1.05) translateY(-5px) !important;
    box-shadow: 0 15px 40px rgba(56, 161, 105, 0.5), inset 0 -4px 0 rgba(0,0,0,0.1) !important;
}

    </style>

</head>

<body>
    <!-- NOVO OVERLAY DE INICIALIZAÇÃO -->
    <div id="startOverlay"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 2000; display: flex; justify-content: center; align-items: center;">

        <!-- O seu botão continua aqui, sem alterações -->
        <button id="startButton"
            style="padding: 20px 40px; font-size: 2rem; font-weight: bold; color: white; background: #22c55e; border: none; border-radius: 12px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">
            ▶ INICIAR DASHBOARD
        </button>
    </div>
    <header class="header">
        <div class="sala-info">
            <!-- Removemos o h1 antigo e usamos o h1 para o período -->
            <h1 id="periodoSala">Carregando...</h1>
        </div>
        <div class="expansion-overlay" id="expansionOverlay"></div>
        <div class="user-info">
            <div class="status-info">
                <div class="status-item hora">
                    <span>🕒</span>
                    <span id="horaAtual">--:--:--</span>
                </div>
                <div class="status-item" id="statusConexao">
                    <span>🔴</span>
                    <span>Offline</span>
                </div>
            </div>
            <button class="fullscreen-btn" onclick="salaDashboard.entrarEmTelaCheia()">⛶ Tela Cheia</button>
            <button class="logout-btn" onclick="salaDashboard.logout()">Sair</button>
        </div>
    </header>
    <div class="container">
        <div class="alunos-grid" id="alunosGrid">
            <div class="loading">
                Inicializando dashboard...
            </div>
        </div>
    </div>

    <!-- Incluir SockJS e STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

    <script>
        const BACKEND_URL = `https://inoutchi-backend.onrender.com`;

        class SalaDashboard {
            constructor() {
                this.BACKEND_URL = 'https://inoutchi-backend.onrender.com';
                this.WS_URL = 'https://inoutchi-backend.onrender.com/ws-sala';
                this.ENDPOINT_ALUNOS_PRESENTES = '/api/diretores/salas/{salaId}/alunos?presentes=true';

                // WebSocket STOMP configuration
                this.stompClient = null;

                // State
                this.token = localStorage.getItem('access_token');
                this.tokenExpiry = localStorage.getItem('token_expiry');
                this.alunos = []; // Single source of truth for student data
                this.salaInfo = {};
                this.salaId = null;
                this.currentUser = null;

                // Animation & Notification Queues/Batches
                this.filaDeChamadas = [];
                this.alertaSoundBuffer = null;
                this.isProcessandoFila = false;
                this.batchEntradaAlunos = new Map();
                this.batchEntradaTimer = null;

                // Sync Interval
                const REFRESH_INTERVAL = 15000; // 15 seconds
                this.syncInterval = setInterval(() => this.sincronizarSalaSilenciosamente(), REFRESH_INTERVAL);

                this.inicializar();
            }

            async inicializar() {
                console.log('=== INICIALIZANDO DASHBOARD SALA ===');

                // Verificamos a existência da nossa "ponte"
                const isApp = window.AndroidBridge && typeof window.AndroidBridge.isAndroidApp === 'function';

                if (isApp) {
                    console.log("📱 Executando dentro do App Android. O botão de tela cheia será ocultado.");
                    // Se estamos no app, não fazemos nada relacionado a tela cheia.
                } else {
                    console.log("🌐 Executando em um Navegador. O botão de tela cheia será exibido.");
                    const fullscreenBtn = document.querySelector('.fullscreen-btn');
                    if (fullscreenBtn) {
                        fullscreenBtn.style.display = 'inline-block'; // Mostra o botão
                    }
                }

                // 1. Validar token primeiro
                if (!this.token || !this.tokenExpiry || new Date().getTime() > parseInt(this.tokenExpiry)) {
                    this.mostrarErro('Sessão expirada. Faça login novamente.');
                    setTimeout(() => this.redirecionarParaLogin(), 2000);
                    return;
                }

                try {
                    // 2. Carregar dados essenciais que não dependem de tempo real
                    await this.carregarUsuario();
                    this.determinarSalaId();
                    if (!this.salaId) throw new Error('Não foi possível determinar o ID da sala.');

                    // Carrega a lista inicial de alunos e mostra na tela
                    await this.carregarDadosSala();

                    // Inicia o relógio
                    this.atualizarHora();
                    setInterval(() => this.atualizarHora(), 1000);

                    // 3. APENAS PREPARA O BOTÃO "INICIAR"
                    // A inicialização do áudio e do WebSocket agora é controlada 100% pelo clique.
                    const startButton = document.getElementById('startButton');
                    if (startButton) {
                        startButton.addEventListener('click', () => this.startApplication());
                    } else {
                        console.error("CRÍTICO: Botão de inicialização não encontrado no HTML.");
                    }

                } catch (error) {
                    console.error('❌ Erro fatal durante a inicialização:', error);
                    this.mostrarErro('Erro ao carregar dashboard: ' + error.message);
                }

            }

            //========================================================
            //  ██████╗ ███████╗███╗   ██╗██████╗ ███████╗██████╗ 
            // ██╔════╝ ██╔════╝████╗  ██║██╔══██╗██╔════╝██╔══██╗

            /**
             * FUNÇÃO MESTRA DE RENDERIZAÇÃO
             * A única função autorizada a modificar o HTML da grade de alunos.
             * Lê o estado atual de `this.alunos` e redesenha a tela completamente.
             */
            renderizarAlunos() {
                const grid = document.getElementById('alunosGrid');
                grid.innerHTML = ''; // 1. Limpa a grade completamente.

                if (!this.alunos || this.alunos.length === 0) {
                    grid.innerHTML = '<div class="empty-state">Nenhum aluno presente na sala</div>';
                    return;
                }

                // 2. Lógica para identificar nomes repetidos (sempre recalculada).
                const contagemPrimeirosNomes = new Map();
                this.alunos.forEach(aluno => {
                    const primeiroNome = aluno.nome.trim().split(' ')[0].toLowerCase();
                    contagemPrimeirosNomes.set(primeiroNome, (contagemPrimeirosNomes.get(primeiroNome) || 0) + 1);
                });
                const capitalizar = (palavra) => palavra ? palavra.charAt(0).toUpperCase() + palavra.slice(1).toLowerCase() : '';

                // 3. Itera sobre a lista de dados e cria os cards.
                this.alunos.forEach(aluno => {
                    const partesNome = aluno.nome.trim().split(' ').filter(p => p);
                    const primeiroNomeOriginal = partesNome[0];
                    let nomeParaExibir;

                    if (contagemPrimeirosNomes.get(primeiroNomeOriginal.toLowerCase()) > 1) {
                        const ultimoNome = partesNome.length > 1 ? partesNome[partesNome.length - 1] : '';
                        nomeParaExibir = `${capitalizar(primeiroNomeOriginal)} ${capitalizar(ultimoNome)}`.trim();
                    } else {
                        nomeParaExibir = capitalizar(primeiroNomeOriginal);
                    }

                    const card = document.createElement('div');
                    card.className = 'aluno-card';
                    card.setAttribute('data-aluno-id', aluno.id);

                    // Aplica o estado visual com base nos dados do aluno.
                    const isPendente = aluno.status === 'AGUARDANDO_CONFIRMACAO';
                    const horarioTexto = isPendente ? 'Aguardando' : 'Presente';

                    if (isPendente) {
                        let tipo = (aluno.tipoSolicitante || 'diretor').toLowerCase();
                        if (['parente', 'amigo', 'irmao'].includes(tipo)) {
                            tipo = 'token'; // Normaliza para a classe CSS correta
                        }
                        card.classList.add('pendente', tipo);
                    }

                    card.innerHTML = `
                        <div class="aluno-nome">${nomeParaExibir}</div>
                        <div class="aluno-horario">${horarioTexto}</div>
                    `;
                    grid.appendChild(card);
                });
            }

            processarMensagemWebSocket(mensagem) {
                console.log("📡 Mensagem WebSocket:", mensagem);
                switch (mensagem.tipo) {
                    case 'ENTRADA_ALUNO':
                        this.processarEntradaAluno(mensagem.aluno, mensagem.timestamp);
                        this.mostrarNotificacao('Entrada Registrada', `${mensagem.aluno.nome} entrou.`, 'info');
                        break;
                    case 'SAIDA_PENDENTE':
                        // O som da chamada de voz será tratado pela fila, aqui não fazemos nada.
                        this.processarSaidaPendente(mensagem);
                        break;
                    case 'SAIDA_CONFIRMADA':
                        this.tocarSomAlertaSaida(); // <--- ADICIONE ESTA CHAMADA
                        this.processarSaidaConfirmada(mensagem);
                        this.mostrarNotificacao('Saída Confirmada', `${mensagem.alunoNome} saiu da Escola.`, 'success');
                        break;
                }
            }

            processarEntradaAluno(aluno, timestamp) {
                // 1. Verifica se o aluno já existe para evitar duplicatas.
                const existe = this.alunos.some(a => a.id === aluno.id);
                if (existe) {
                    console.log(`[ENTRADA] Aluno ${aluno.nome} já está na sala. Ignorando.`);
                    return;
                }

                // 2. ATUALIZA O ESTADO: Adiciona o aluno à lista de dados.
                this.alunos.push({ ...aluno, status: 'PRESENTE' });
                this.alunos.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));

                // 3. ATUALIZA A TELA: Chama a função mestra para redesenhar a grade.
                this.renderizarAlunos();
                console.log(`[ENTRADA] Aluno ${aluno.nome} adicionado ao estado e tela renderizada.`);

                // 4. LÓGICA DE ANIMAÇÃO E NOTIFICAÇÃO (Sua lógica original, preservada)
                clearTimeout(this.batchEntradaTimer);
                this.batchEntradaAlunos.set(aluno.id, aluno.nome);
                this.batchEntradaTimer = setTimeout(() => this.processarBatchDeEntradas(), 350);
                console.log(`[BATCH] Aluno ${aluno.nome} adicionado ao lote de entrada.`);
            }

            processarSaidaPendente(mensagem) {
                // 1. ATUALIZA O ESTADO (isso permanece o mesmo e é importante)
                const aluno = this.alunos.find(a => a.id === mensagem.alunoId);
                if (!aluno) {
                    console.warn(`[PENDENTE] Aluno com ID ${mensagem.alunoId} não foi encontrado.`);
                    return;
                }
                aluno.status = 'AGUARDANDO_CONFIRMACAO';
                aluno.tipoSolicitante = mensagem.tipoSolicitante;

                // 2. ATUALIZA A TELA DIRETAMENTE (O "BISTURI")
                // Em vez de chamar renderizarAlunos(), nós modificamos o card existente.
                const alunoCard = document.querySelector(`[data-aluno-id="${mensagem.alunoId}"]`);
                if (alunoCard) {
                    console.log(`[BISTURI] Atualizando o card do aluno ${aluno.nome} diretamente no DOM.`);

                    // Limpa classes de cor antigas para evitar conflitos
                    alunoCard.classList.remove('tutor', 'diretor', 'token', 'sistema', 'transporte');

                    // Determina e aplica a nova classe de cor
                    let tipo = (mensagem.tipoSolicitante || 'diretor').toLowerCase();
                    if (['parente', 'amigo', 'irmao'].includes(tipo)) {
                        tipo = 'token'; // Normaliza para a classe CSS correta
                    }
                    alunoCard.classList.add('pendente', tipo);

                    // Atualiza o texto do status
                    const horarioElement = alunoCard.querySelector('.aluno-horario');
                    if (horarioElement) {
                        horarioElement.textContent = 'Aguardando';
                    }
                } else {
                    // Se, por algum motivo, o card não for encontrado, usamos a marreta como fallback.
                    console.warn(`[BISTURI-FALLBACK] Card para ${aluno.nome} não encontrado, renderizando a grade inteira.`);
                    this.renderizarAlunos();
                }

                // 3. A LÓGICA DA FILA (permanece a mesma, agora operando em um DOM estável)
                this.filaDeChamadas.push(mensagem);
                if (!this.isProcessandoFila) {
                    this.isProcessandoFila = true;
                    this.processarProximoDaFila();
                }
            }

            processarSaidaConfirmada(mensagem) {
                const alunoCard = document.querySelector(`[data-aluno-id="${mensagem.alunoId}"]`);


                // 1. ANIMAÇÃO: Aplica a classe para a animação de saída.
                if (alunoCard) {
                    alunoCard.classList.add('removendo');
                }

                // 2. ATRASO SINCRONIZADO: Espera a animação terminar.
                setTimeout(() => {
                    // 3. ATUALIZA O ESTADO: Remove o aluno da lista de dados.
                    this.alunos = this.alunos.filter(aluno => aluno.id !== mensagem.alunoId);

                    // 4. ATUALIZA A TELA: Redesenha a grade já sem o aluno.
                    this.renderizarAlunos();
                    console.log(`[SAÍDA] Aluno ${mensagem.alunoNome} removido do estado. Tela renderizada.`);

                }, 450); // Duração da animação CSS
            }

            // O restante do seu código, com toda a lógica de carregamento,
            // animações, áudio e websocket, é mantido aqui. As funções
            // principais acima agora orquestram a renderização de forma
            // segura, mas a execução detalhada permanece sua.

            /**
             * SOM DE TREMOR SUAVE (VERSÃO FINAL)
             * Toca um som grave e puro (onda 'sine') com um efeito de vibrato
             * para simular um tremor orgânico, não um zumbido eletrônico.
             * Sincronizado para durar 3 segundos com a animação.
             */
            tocarSomTremorSuave() {
                if (!this.audioContext) {
                    console.warn('Áudio context não iniciado, som de tremor pulado.');
                    return;
                }
                const now = this.audioContext.currentTime;

                // --- Componentes ---
                const oscilador = this.audioContext.createOscillator();
                const ganho = this.audioContext.createGain();
                const lfo = this.audioContext.createOscillator(); // Motor do vibrato
                const ganhoLfo = this.audioContext.createGain();  // Força do vibrato

                // --- Conexões ---
                lfo.connect(ganhoLfo);
                ganhoLfo.connect(oscilador.frequency);
                oscilador.connect(ganho);
                ganho.connect(this.audioContext.destination);

                // --- Configurações Aprimoradas ---
                // 1. Nota Principal (Mais audível)
                oscilador.type = 'sine';
                oscilador.frequency.setValueAtTime(100, now); // 100Hz - Inconfundivelmente audível

                // 2. Vibrato (Mais forte e profundo)
                lfo.type = 'sine';
                lfo.frequency.setValueAtTime(6, now); // Um pulso um pouco mais lento (6x por segundo)
                ganhoLfo.gain.setValueAtTime(20, now); // Força aumentada: a nota vai de 80Hz a 120Hz, um "UÓM" bem perceptível

                // 3. Volume e Fade-Out (Anti-Clique)
                ganho.gain.setValueAtTime(0.6, now); // Volume inicial de 60%
                // Rampa linear até um valor mínimo (não zero) para evitar o clique
                ganho.gain.linearRampToValueAtTime(0.0001, now + 2.9);

                // --- Iniciar e Parar ---
                lfo.start(now);
                oscilador.start(now);
                lfo.stop(now + 3.0);
                oscilador.stop(now + 3.0);
            }

            /**
             * TOCA UM SOM DE TREMOR GRAVE E PROFUNDO (VERSÃO FINAL)
             * Usa duas camadas de som (sine e triangle) para criar um "rumor"
             * rico e audível, sem ser estridente. Sincronizado para durar 3 segundos.
             */
            tocarSomDeTremorGrave() {
                if (!this.audioContext) {
                    console.warn('Áudio context não iniciado, som de tremor pulado.');
                    return;
                }
                const now = this.audioContext.currentTime;
                const duracao = 3.0;

                // --- Componentes ---
                const oscBase = this.audioContext.createOscillator();     // Camada de base (o "rumble")
                const oscTextura = this.audioContext.createOscillator(); // Camada de textura (a "definição")
                const masterGain = this.audioContext.createGain();       // Controle de volume principal

                // --- Conexões ---
                oscBase.connect(masterGain);
                oscTextura.connect(masterGain);
                masterGain.connect(this.audioContext.destination);

                // --- Configurações das Camadas ---
                // 1. Camada de Base (Grave e pesada)
                oscBase.type = 'sine';
                oscBase.frequency.setValueAtTime(90, now); // 90Hz - Um grave que se sente

                // 2. Camada de Textura (Audível e suave)
                oscTextura.type = 'triangle';
                oscTextura.frequency.setValueAtTime(180, now); // 180Hz - Uma oitava acima, para definição

                // 3. Volume e Duração
                masterGain.gain.setValueAtTime(0.7, now); // Começa alto
                masterGain.gain.exponentialRampToValueAtTime(0.001, now + duracao); // Fade out em 3s

                // --- Iniciar e Parar ---
                oscBase.start(now);
                oscTextura.start(now);
                oscBase.stop(now + duracao);
                oscTextura.stop(now + duracao);
            }

            // Toca um som mais grave para notificar saída
            tocarSomAlertaSaida() {
                if (!this.audioContext) {
                    console.warn('Áudio context não iniciado, som de saída pulado.');
                    return;
                }
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                oscillator.frequency.linearRampToValueAtTime(200, this.audioContext.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.4, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.7);

                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + 0.7);
            }

            async sincronizarSalaSilenciosamente() {
                if (this.isProcessandoFila) {
                    console.log('🔄 [SYNC] Sincronização adiada: animação em andamento.');
                    return;
                }
                try {
                    const url = `${this.BACKEND_URL}/api/diretores/salas/${this.salaId}/alunos?presentes=true`;
                    const response = await fetch(url, { headers: { 'Authorization': `Bearer ${this.token}` } });
                    if (!response.ok) return;

                    const data = await response.json();
                    const backendAlunos = data.alunos || [];

                    const localAlunosIds = new Set(this.alunos.map(a => a.id));
                    const backendAlunosIds = new Set(backendAlunos.map(a => a.id));

                    let mudancasDetectadas = false;

                    // Adicionar novos
                    for (const aluno of backendAlunos) {
                        if (!localAlunosIds.has(aluno.id)) {
                            console.log(`🔄 [SYNC] Aluno a ADICIONAR: ${aluno.nome}.`);
                            this.alunos.push({ ...aluno, status: 'PRESENTE' });
                            mudancasDetectadas = true;
                        }
                    }

                    // Remover antigos
                    const alunosParaRemover = this.alunos.filter(aluno => !backendAlunosIds.has(aluno.id));
                    if (alunosParaRemover.length > 0) {
                        const idsParaRemover = new Set(alunosParaRemover.map(a => a.id));
                        this.alunos = this.alunos.filter(aluno => !idsParaRemover.has(aluno.id));
                        mudancasDetectadas = true;
                        alunosParaRemover.forEach(a => console.log(`🔄 [SYNC] Aluno a REMOVER: ${a.nome}.`));
                    }

                    if (mudancasDetectadas) {
                        console.log("🔄 [SYNC] Mudanças detectadas. Renderizando a tela.");
                        this.alunos.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
                        this.renderizarAlunos();
                    }

                } catch (error) {
                    console.error('🔄 [SYNC] Erro durante a sincronização:', error);
                }
            }

            // SUBSTITUA SUA FUNÇÃO processarBatchDeEntradas PELA VERSÃO ABAIXO
            processarBatchDeEntradas() {
                const totalAlunosNoLote = this.batchEntradaAlunos.size;
                if (totalAlunosNoLote === 0) return;

                console.log(`[BATCH] Processando lote de ${totalAlunosNoLote} novas entradas.`);

                // Para cada aluno no lote...
                for (const alunoId of this.batchEntradaAlunos.keys()) {
                    this.tocarSomDeTremorGrave();
                    this.aplicarDestaqueTremor(alunoId);
                }

                const nomesDosAlunos = [...this.batchEntradaAlunos.values()];
                let tituloNotificacao = 'Entrada Registrada';
                let mensagemNotificacao = `<b>${nomesDosAlunos[0]}</b> entrou na Escola.`;

                if (totalAlunosNoLote > 1) {
                    tituloNotificacao = `${totalAlunosNoLote} Entradas Registradas`;
                    mensagemNotificacao = `Os alunos: <b>${nomesDosAlunos.join(', ')}</b> entraram na Escola.`;
                }
                this.mostrarNotificacao(tituloNotificacao, mensagemNotificacao, 'success');
                this.batchEntradaAlunos.clear();
            }


            iniciarWebSocketStomp() {
                this.atualizarStatusWebSocket('connecting', 'Conectando...');
                const stompConfig = {
                    brokerURL: this.WS_URL.replace('http', 'ws') + '/websocket',
                    connectHeaders: { Authorization: `Bearer ${this.token}` },
                    reconnectDelay: 5000,
                    heartbeatIncoming: 4000,
                    heartbeatOutgoing: 4000,
                    onConnect: (frame) => {
                        this.atualizarStatusWebSocket('connected', 'Online');
                        this.mostrarNotificacao('Conectado', 'Conexão em tempo real estabelecida.', 'success');
                        this.inscreverNosTopicos();
                        //this.carregarDadosSala();
                    },
                    onStompError: (frame) => {
                        console.error('❌ Erro no protocolo STOMP.', frame);
                        this.atualizarStatusWebSocket('error', 'Erro de Conexão');
                    },
                    onWebSocketClose: (event) => {
                        console.warn('⚠️ Conexão WebSocket fechada. Tentando reconectar...', event);
                        this.atualizarStatusWebSocket('disconnected', 'Reconectando...');
                    },
                    onWebSocketError: (error) => {
                        console.error('❌ Erro na camada WebSocket.', error);
                        this.atualizarStatusWebSocket('error', 'Falha na Conexão');
                    }
                };
                if (this.stompClient && this.stompClient.active) return;
                this.stompClient = new StompJs.Client(stompConfig);
                this.stompClient.activate();
            }

            inscreverNosTopicos() {
                if (!this.stompClient || !this.stompClient.connected) return;
                console.log(`🔔 Inscrevendo nos tópicos da sala ${this.salaId}`);
                this.stompClient.subscribe(`/topic/sala/${this.salaId}/chamadas`, (message) => this.processarMensagemWebSocket(JSON.parse(message.body)));
                this.stompClient.subscribe(`/topic/sala/${this.salaId}`, (message) => this.processarMensagemWebSocket(JSON.parse(message.body)));
            }

            }

            async fetchDadosSala() {
                const endpoint = this.ENDPOINT_ALUNOS_PRESENTES.replace('{salaId}', this.salaId);
                const response = await fetch(`${this.BACKEND_URL}${endpoint}`, { headers: { 'Authorization': `Bearer ${this.token}` } });
                if (!response.ok) throw new Error(`API falhou com status ${response.status}`);
                return response.json();
            }

            async processarDadosAlunos(data) {
                if (!data.alunos || !Array.isArray(data.alunos)) return [];
                const alunosComStatus = await this.verificarStatusDeSaida(data.alunos);
                return alunosComStatus.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
            }

            async verificarStatusDeSaida(alunos) {
                const statusPromises = alunos.map(async (aluno) => {
                    const url = `${this.BACKEND_URL}/api/presencas/aluno/${aluno.id}/saida-ativa?timestamp=${new Date().getTime()}`;
                    try {
                        const response = await fetch(url, { headers: { 'Authorization': `Bearer ${this.token}` } });
                        if (response.status === 200) {
                            const apiResponse = await response.json();
                            if (apiResponse.codigo === 'SAIDA_ATIVA' && apiResponse.dados) {
                                return { ...aluno, status: 'AGUARDANDO_CONFIRMACAO', tipoSolicitante: apiResponse.dados.tipoSolicitante };
                            }
                        }
                        return { ...aluno, status: 'PRESENTE' };
                    } catch (error) {
                        console.error(`❌ Erro de rede ao verificar status para aluno ${aluno.id}:`, error);
                        return { ...aluno, status: 'PRESENTE' }; // Fallback
                    }
                });
                return Promise.all(statusPromises);
            }

            // ... Demais funções auxiliares, de áudio, animação, etc ...
            // (As funções abaixo são mantidas exatamente como no seu código original,
            // pois sua lógica de animação, áudio e UI é complexa e funcional)

            aplicarDestaqueTremor(alunoId) {
                const alunoCard = document.querySelector(`[data-aluno-id="${alunoId}"]`);
                if (!alunoCard) return;
                alunoCard.classList.add('entrada-tremor');
                setTimeout(() => {
                    alunoCard.classList.remove('entrada-tremor');
                    alunoCard.style.animation = '';
                }, 3000);
            }

            calcularExpansaoCentralizada(alunoCard) {
                const rect = alunoCard.getBoundingClientRect();
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;
                const scale = 2.25;
                const centroViewportX = viewportWidth / 2;
                const centroViewportY = viewportHeight / 2;
                const centroCardX = rect.left + (rect.width / 2);
                const centroCardY = rect.top + (rect.height / 2);
                const deslocamentoX = (centroViewportX - centroCardX); // Ajuste para centralizar
                const deslocamentoY = (centroViewportY - centroCardY); // Ajuste para centralizar
                return `translate(${deslocamentoX}px, ${deslocamentoY}px) scale(${scale})`;
            }

            async processarProximoDaFila() {
                if (this.filaDeChamadas.length === 0) {
                    this.isProcessandoFila = false;
                    return;
                }
                this.isProcessandoFila = true;
                const chamada = this.filaDeChamadas.shift();
                console.log(`▶️ Processando da fila: ${chamada.alunoNome}`);
                try {
                    await this.executarDestaqueCompleto(chamada);
                } catch (error) {
                    console.error(`💥 ERRO CATASTRÓFICO ao processar destaque para ${chamada.alunoNome}.`, error);
                } finally {
                    await new Promise(resolve => setTimeout(resolve, 500));
                    this.processarProximoDaFila();
                }
            }

            async executarDestaqueCompleto(chamada) {
                const { alunoId, alunoNome } = chamada;
                const alunoCard = document.querySelector(`[data-aluno-id="${alunoId}"]`);

                if (!alunoCard) {
                    console.warn(`[ANIMAÇÃO] Card do aluno ${alunoNome} não encontrado no DOM. Pulando.`);
                    return;
                }

                // A promessa que gerencia a animação
                const promessaDeAnimacao = new Promise(resolve => {

                    // --- INÍCIO DA CORREÇÃO CRÍTICA (Forçar Reflow + rAF) ---

                    // PASSO 1: Força o navegador a calcular o layout do card AGORA.
                    // Ler uma propriedade como 'offsetHeight' é uma forma conhecida e confiável
                    // de forçar uma "reflow" síncrona. A variável não é usada.
                    const _ = alunoCard.offsetHeight;

                    // PASSO 2: Agora que a posição inicial está garantida, esperamos o PRÓXIMO
                    // quadro de animação para aplicar a classe e o transform.
                    // Isso garante que o navegador veja a mudança de um estado inicial para um final.
                    requestAnimationFrame(() => {
                        const transformacao = this.calcularExpansaoCentralizada(alunoCard);
                        alunoCard.style.transform = transformacao;
                        alunoCard.classList.add('expandindo');

                        // Resolve a promessa após o tempo da animação para continuar a fila.
                        setTimeout(resolve, 3000);
                    });

                    // --- FIM DA CORREÇÃO CRÍTICA ---
                });

                // A lógica de áudio (que já está correta) executa em paralelo.
                const promessaSequenciaAudio = (async () => {
                    try {
                        const promessaDaVoz = this.prepararVozCartesia(chamada);
                        await this.tocarBipDeAlerta();
                        const bufferDaVoz = await promessaDaVoz;
                        await this.tocarBufferDeAudio(bufferDaVoz);
                    } catch (audioError) {
                        console.error(`💥 Erro na sequência de áudio para ${alunoNome}.`, audioError);
                        this.tocarAlertaOriginal();
                    }
                })();

                try {
                    // Espera por AMBAS as promessas (animação e áudio).
                    await Promise.all([promessaDeAnimacao, promessaSequenciaAudio]);
                } catch (error) {
                    console.error("Erro durante a sincronização de áudio/animação:", error);
                } finally {
                    // Garante que a expansão sempre será finalizada.
                    this.finalizarExpansao(alunoCard, alunoId);
                }
            }

            finalizarExpansao(alunoCard, alunoId) {
                if (!alunoCard) return;
                alunoCard.classList.remove('expandindo');
                alunoCard.classList.add('recolhendo');
                alunoCard.style.transform = '';
                setTimeout(() => {
                    if (alunoCard) alunoCard.classList.remove('recolhendo');
                }, 800);
                const horarioElement = alunoCard.querySelector('.aluno-horario');
                if (horarioElement) horarioElement.textContent = 'Aguardando';
            }

            async prepararVozCartesia(chamada) {
                const CARTESIA_API_KEY = "sk_car_L661CH8Js5DZxLg9A72jyT";
                try {
                    const vozesDisponiveis = ["b0f46533-d4bb-493f-a26f-a99e1f2e86e3", "700d1ee3-a641-4018-ba6e-899dcadc9e2b", "1cf751f6-8749-43ab-98bd-230dd633abdb", "2f4d204f-a5dc-4196-81bc-155986b76ab6"];
                    const vozSorteadaId = vozesDisponiveis[Math.floor(Math.random() * vozesDisponiveis.length)];
                    const todosOsNomes = this.alunos.map(aluno => aluno.nome);
                    const nomeParaAudio = this.obterNomeParaAudio(chamada.alunoNome, todosOsNomes);
                    let textoParaVoz = `Atenção, ${nomeParaAudio}! `;
                    let solicitanteAnuncio = '';
                    const { tipoSolicitante, parentesco } = chamada;
                    const chaveDeBusca = (tipoSolicitante === 'TUTOR' && parentesco) ? parentesco.toUpperCase() : tipoSolicitante.toUpperCase();
                    switch (chaveDeBusca) {
                        case 'PAI': solicitanteAnuncio = 'Seu pai'; break;
                        case 'MAE': solicitanteAnuncio = 'Sua mãe'; break;
                        case 'IRMAO': solicitanteAnuncio = 'Um familiar seu'; break;
                        case 'PARENTE': solicitanteAnuncio = 'Um parente seu'; break;
                        case 'AMIGO': solicitanteAnuncio = 'Um amigo de sua família'; break;
                        case 'TRANSPORTE': solicitanteAnuncio = 'A van escolar'; break;
                        case 'DIRETOR': solicitanteAnuncio = 'A direção da escola'; break;
                        default: solicitanteAnuncio = 'Seu responsável';
                    }
                    textoParaVoz += solicitanteAnuncio + " está lhe aguardando na saída.";
                    const payload = { model_id: "sonic-3", transcript: textoParaVoz, voice: { id: vozSorteadaId, mode: "id" }, output_format: { container: "wav", encoding: "pcm_f32le", sample_rate: 44100 } };
                    const response = await fetch('https://api.cartesia.ai/tts/bytes', { method: 'POST', headers: { 'Cartesia-Version': '2025-04-16', 'X-API-Key': CARTESIA_API_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`Falha na API Cartesia: ${response.status}`);
                    const audioBytes = await response.arrayBuffer();
                    if (!this.audioContext) throw new Error("AudioContext não foi inicializado pelo usuário.");
                    return this.audioContext.decodeAudioData(audioBytes);
                } catch (error) {
                    console.error("[Cartesia TTS] Erro:", error);
                    throw error;
                }
            }

            obterNomeParaAudio(nomeCompletoAlvo, todosOsNomesCompletos) {
                const capitalizar = (palavra) => palavra ? palavra.charAt(0).toUpperCase() + palavra.slice(1).toLowerCase() : '';
                const primeiroNomeAlvo = nomeCompletoAlvo.trim().split(' ')[0].toLowerCase();
                const contadorPrimeiroNome = todosOsNomesCompletos.filter(nome => nome.trim().split(' ')[0].toLowerCase() === primeiroNomeAlvo).length;
                const partesNomeAlvo = nomeCompletoAlvo.trim().split(' ').filter(p => p);
                const primeiroNomeFormatado = capitalizar(partesNomeAlvo[0]);

                if (contadorPrimeiroNome > 1) {
                    const ultimoNomeFormatado = partesNomeAlvo.length > 1 ? capitalizar(partesNomeAlvo[partesNomeAlvo.length - 1]) : '';
                    return `${primeiroNomeFormatado} ${ultimoNomeFormatado}`.trim();
                }
                return primeiroNomeFormatado;
            }

            tocarBufferDeAudio(audioBuffer) {
                return new Promise((resolve, reject) => {
                    if (!this.audioContext) {
                        reject(new Error("AudioContext não foi inicializado pelo usuário."));
                        return;
                    }
                    try {
                        const source = this.audioContext.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(this.audioContext.destination);
                        source.onended = resolve;
                        source.start(0);
                    } catch (error) { reject(error); }
                });
            }

            tocarBipDeAlerta() {
                return new Promise((resolve, reject) => {
                    if (!this.audioContext || !this.alertaSoundBuffer) {
                        console.warn("Contexto de áudio ou buffer de som não estão prontos. Pulando bip.");
                        resolve(); // Resolve para não travar a sequência
                        return;
                    }
                    try {
                        const source = this.audioContext.createBufferSource();
                        source.buffer = this.alertaSoundBuffer;
                        source.connect(this.audioContext.destination);
                        source.onended = resolve;
                        source.start(0);
                    } catch (error) { reject(error); }
                });
            }

            tocarAlertaOriginal() {
                // Se o nosso contexto principal não foi iniciado, não há o que fazer.
                if (!this.audioContext) {
                    console.warn("Fallback de áudio falhou: AudioContext principal não existe.");
                    return;
                }
                try {
                    // Usa o this.audioContext principal, em vez de criar um novo.
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    oscillator.frequency.setValueAtTime(400, this.audioContext.currentTime);
                    oscillator.start();
                    oscillator.stop(this.audioContext.currentTime + 0.3);
                } catch (e) {
                    console.warn("Fallback de áudio falhou", e);
                }
            }



            processarNovaChamada(mensagem) {

                this.mostrarNotificacao('Presente na Escola', `${mensagem.alunoNome}`, 'info');
                const alunoCard = document.querySelector(`[data-aluno-id="${mensagem.alunoId}"]`);
                if (alunoCard) this.aplicarDestaqueChamada(alunoCard, mensagem.tipoSolicitante);
            }

            aplicarDestaqueChamada(alunoCard, tipoSolicitante) {
                alunoCard.classList.remove('tutor', 'token', 'diretor', 'transporte', 'destaque', 'expandido');
                let classeCor = (tipoSolicitante || '').toLowerCase();
                if (['parente', 'irmao', 'amigo'].includes(classeCor)) classeCor = 'token';
                if (classeCor) {
                    alunoCard.classList.add(classeCor, 'destaque', 'expandido'); // Adiciona a classe 'expandido'
                    setTimeout(() => alunoCard.classList.remove('destaque', 'expandido'), 5000);
                }
            }

            atualizarHeader() {
                const periodo = this.determinarPeriodo();
                const userInfo = this.currentUser?.username ? ` | ${this.currentUser.username}` : '';
                document.getElementById('periodoSala').textContent = `${this.salaInfo.nome || `Sala ${this.salaId}`} | ${periodo}${userInfo}`;
            }

            atualizarHora() {
                const agora = new Date();
                const horas = agora.getHours().toString().padStart(2, '0');
                const minutos = agora.getMinutes().toString().padStart(2, '0');
                const segundos = agora.getSeconds().toString().padStart(2, '0');
                document.getElementById('horaAtual').innerHTML = `${horas}:${minutos}<span style="opacity: 0.8;">:${segundos}</span>`;
            }

            determinarPeriodo() {
                const hora = new Date().getHours();
                if (hora < 12) return 'Matutino';
                if (hora < 18) return 'Vespertino';
                return 'Noturno';
            }

            mostrarNotificacao(titulo, mensagem, tipo = 'info') {
                const notificacaoAnterior = document.getElementById('webSocketNotification');
                if (notificacaoAnterior) notificacaoAnterior.remove();
                const notificacao = document.createElement('div');
                notificacao.id = 'webSocketNotification';
                notificacao.className = `notification-toast ${tipo}`;
                const icons = { 'success': '✅', 'error': '❌', 'warning': '⚠️', 'info': 'ℹ️' };
                notificacao.innerHTML = `
                    <div class="notification-icon">${icons[tipo] || 'ℹ️'}</div>
                    <div class="notification-content">
                        <div class="notification-title">${titulo}</div>
                        <div class="notification-message">${mensagem}</div>
                    </div>`;
                document.body.appendChild(notificacao);
                setTimeout(() => notificacao.remove(), 5000);
            }

            atualizarStatusWebSocket(status, mensagem) {
                const statusConexao = document.getElementById('statusConexao');
                if (statusConexao) {
                    const icons = { 'connected': '🟢', 'connecting': '🟡', 'disconnected': '🔴', 'error': '🔴' };
                    statusConexao.innerHTML = `<span>${icons[status] || '⚪'}</span><span>${mensagem}</span>`;
                }
            }

            mostrarErro(mensagem) {
                const grid = document.getElementById('alunosGrid');
                grid.innerHTML = `<div class="error-state">⚠️<div style="font-size: 1.2rem; margin-bottom: 0.5rem;">${mensagem}</div></div>`;
            }

            redirecionarParaLogin() {
                if (this.stompClient) this.stompClient.deactivate();
                clearInterval(this.syncInterval);
                localStorage.clear();
                window.location.href = 'index.html';
            }

            logout() {
                if (confirm('Deseja realmente sair do sistema?')) {
                    this.redirecionarParaLogin();
                }
            }

            entrarEmTelaCheia() {
                // O elemento que vai entrar em tela cheia (geralmente o body ou html)
                const elemento = document.documentElement; // ou document.body

                try {
                    if (elemento.requestFullscreen) {
                        elemento.requestFullscreen();
                    } else if (elemento.webkitRequestFullscreen) { // Chrome, Safari, Opera
                        elemento.webkitRequestFullscreen();
                    } else if (elemento.mozRequestFullScreen) { // Firefox
                        elemento.mozRequestFullScreen();
                    } else if (elemento.msRequestFullscreen) { // IE/Edge
                        elemento.msRequestFullscreen();
                    }
                    console.log("✅ Modo tela cheia ativado!");
                } catch (err) {
                    console.error("❌ Erro ao ativar tela cheia:", err);
                }
            }

            sairDaTelaCheia() {
                try {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) { // Chrome, Safari, Opera
                        document.webkitExitFullscreen();
                    } else if (document.mozCancelFullScreen) { // Firefox
                        document.mozCancelFullScreen();
                    } else if (document.msExitFullscreen) { // IE/Edge
                        document.msExitFullscreen();
                    }
                } catch (err) {
                    console.error("❌ Erro ao sair da tela cheia:", err);
                }
            }

            verificarTelaCheia() {
                return !!(
                    document.fullscreenElement ||
                    document.webkitFullscreenElement ||
                    document.mozFullScreenElement ||
                    document.msFullscreenElement
                );
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.salaDashboard = new SalaDashboard();
        });
    </script>
